apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: workerfleet
  labels:
    app.kubernetes.io/name: workerfleet
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: workerfleet
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
