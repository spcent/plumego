apiVersion: v1
kind: ServiceAccount
metadata:
  name: workerfleet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workerfleet-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workerfleet-pod-reader
subjects:
  - kind: ServiceAccount
    name: workerfleet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workerfleet-pod-reader
