apiVersion: v1
kind: ConfigMap
metadata:
  name: workerfleet-config
data:
  WORKERFLEET_HTTP_ADDR: ":8080"
  WORKERFLEET_PROFILE: "prod"
  WORKERFLEET_STORE_BACKEND: "mongo"
  WORKERFLEET_MONGO_DATABASE: "workerfleet"
  WORKERFLEET_RETENTION_DAYS: "7"
  WORKERFLEET_EXPERIMENTAL_METRICS_ENABLED: "false"
  WORKERFLEET_QUERY_AUTH_REQUIRED: "true"
  WORKERFLEET_KUBE_SYNC_ENABLED: "true"
  WORKERFLEET_STATUS_SWEEP_ENABLED: "true"
  WORKERFLEET_ALERT_EVALUATION_ENABLED: "true"
  WORKERFLEET_NOTIFICATION_ENABLED: "false"
  WORKERFLEET_KUBE_SYNC_INTERVAL: "30s"
  WORKERFLEET_STATUS_SWEEP_INTERVAL: "30s"
  WORKERFLEET_ALERT_EVALUATION_INTERVAL: "30s"
  WORKERFLEET_NOTIFIER_DELIVERY_TIMEOUT: "5s"
  WORKERFLEET_LOOP_LEASE_TTL: "90s"
  WORKERFLEET_KUBE_WORKER_CONTAINER: "worker"
  WORKERFLEET_KUBE_NAMESPACE: "default"
  WORKERFLEET_KUBE_LABEL_SELECTOR: "app=worker"
---
apiVersion: v1
kind: Service
metadata:
  name: workerfleet
  labels:
    app.kubernetes.io/name: workerfleet
spec:
  selector:
    app.kubernetes.io/name: workerfleet
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workerfleet
  labels:
    app.kubernetes.io/name: workerfleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: workerfleet
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workerfleet
    spec:
      serviceAccountName: workerfleet
      containers:
        - name: workerfleet
          image: ghcr.io/example/workerfleet:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: workerfleet-config
          env:
            - name: WORKERFLEET_MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: workerfleet-secrets
                  key: mongo-uri
            - name: WORKERFLEET_KUBE_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: workerfleet-secrets
                  key: kube-bearer-token
                  optional: true
            - name: WORKERFLEET_WORKER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: workerfleet-secrets
                  key: worker-auth-token
            - name: WORKERFLEET_ADMIN_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: workerfleet-secrets
                  key: admin-auth-token
            - name: WORKERFLEET_LOOP_LEASE_OWNER
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKERFLEET_FEISHU_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: workerfleet-secrets
                  key: feishu-webhook-url
                  optional: true
            - name: WORKERFLEET_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: workerfleet-secrets
                  key: webhook-url
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
