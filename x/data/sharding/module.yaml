allowed_imports:
  - stdlib
  - database/sql
  - github.com/spcent/plumego/x/data/rw

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - contract/**
  - examples/**
  - reference/**
  - templates/**
  - cmd/**

test_commands:
  - go test -race -timeout 60s ./x/data/sharding/...
  - go test -timeout 20s ./x/data/sharding/...
  - go vet ./x/data/sharding/...

change_risks:
  - topology regression
  - persistence correctness regression
  - cross-shard data isolation regression
  - SQL rewriting correctness regression

review_checklist:
  - Cross-shard deny policy must be the safe default; document any deviation
  - Shard key resolution must be deterministic for a given input
  - SQL rewriting must not alter query semantics, only table name suffixes
  - BeginTxOnShard must be used for explicit shard-scoped transactions; BeginTx without a default shard must error

agent_hints:
  - Build each shard as an rw.Cluster and pass the slice to NewRouter when the caller owns cluster lifecycle; use ClusterDB/New only when the convenience wrapper should own and close configured shard DB handles
  - Use CrossShardDeny (the default) unless you explicitly need first-shard or first-success fan-out reads; CrossShardFirstSuccess does not merge rows from multiple shards
  - Use BeginTxOnShard when the transaction's shard is known, keep DefaultShardIndex disabled unless you want a deliberate single-shard fallback, and prefer mod/hash/range/list according to the key shape

landing_zones:
  router: router.go
  resolver: resolver.go
  strategy: strategy.go
