name: x/data/sharding
path: x/data/sharding
layer: extension
status: experimental
owner: persistence
risk: high
summary: Database sharding router that distributes SQL queries across multiple rw.Cluster shards with safe-default cross-shard denial, explicit shard-scoped transactions, and configurable strategy selection.

responsibilities:
  - Shard key resolution from SQL query arguments
  - SQL query rewriting for physical table names per shard
  - Query routing to single or multiple shards based on resolved key
  - Cross-shard query policies (Deny, First, FirstSuccess)
  - Pluggable sharding strategies (Hash, Mod, Range, List, Custom)
  - Per-shard and per-router query metrics
  - Dynamic configuration watching via x/data/sharding/config

non_goals:
  - Primary-replica splitting within a shard (see x/data/rw)
  - Storage interface definitions (see store)
  - HTTP transport behavior
  - Business repositories
  - App bootstrap

