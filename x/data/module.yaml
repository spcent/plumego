name: x/data
path: x/data
layer: extension
status: experimental
suggested_gate_profile: single_module_behavior
owner: persistence
risk: medium
summary: High-level data topology capabilities that should not live in the stable store layer.

entrypoint_reads:
  - AGENTS.md
  - docs/reference/canonical-style-guide.md
  - AGENTS.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x/data/README.md

subordinate_families:
  - x/data/cache
  - x/data/file
  - x/data/idempotency
  - x/data/kvengine
  - x/data/pgx
  - x/data/sqlx
  - x/data/migrate
  - x/data/rw
  - x/data/sharding

responsibilities:
  - Read-write splitting orchestration
  - Sharding and routing topology
  - Data access policy composition
  - Tenant-aware topology adapters
  - Durable KV-engine ownership beyond the stable store/kv primitive
  - Durable idempotency provider ownership beyond stable store/idempotency primitives

non_goals:
  - App bootstrap
  - HTTP transport behavior
  - Business repositories
  - Stable store primitives

public_entrypoints:
  - cache
  - file
  - kvengine
  - idempotency
  - migrate
  - pgx
  - rw
  - sharding
  - sqlx

allowed_imports:
  - stdlib
  - contract
  - log
  - metrics
  - store
  - x/tenant

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - examples/**
  - reference/**
  - templates/**
  - cmd/**

test_commands:
  - go test -race -timeout 60s ./x/data/...
  - go test -timeout 20s ./x/data/...
  - go vet ./x/data/...

doc_paths:
  - docs/modules/x/data/README.md

change_risks:
  - topology regression
  - isolation regression
  - persistence correctness regression

stop_conditions:
  - The change introduces business repositories, HTTP transport behavior, or stable store primitives into x/data
  - The change hides topology routing, sharding, or rw-split decisions behind implicit registries or globals
  - The change requires stable store to learn topology ownership that belongs in x/data
  - The change turns x/data/cache into a competing family entrypoint instead of a subordinate topology package

review_checklist:
  - Keep stable store primitives out of this module
  - Keep topology decisions explicit and reviewable
  - Keep transport concerns out of this module
  - Keep tenant-aware topology and provider ownership explicit
  - Keep durable topology behavior separate from business repository logic

agent_hints:
  - "store vs x/data: in-process primitives (MemoryCache, local file, in-memory KV/idempotency) → store; distributed/cloud/durable topology (Redis, S3, WAL-KV, SQL idempotency, sharding) → x/data"
  - Move sharding and rw orchestration here instead of widening store; keep business repositories and domain-specific dedupe rules in app code
  - x/data/cache is a subordinate package; start distributed/Redis cache work from x/data before opening x/data/cache directly

task_affinity:
  store: x/data/
  bugfix_triage: x/data/

landing_zones:
  cache: cache/
  file: file/
  kv_engine: kvengine/
  idempotency: idempotency/
  migrate: migrate/
  pgx: pgx/
  sqlx: sqlx/
  rw_split: rw/
  topology: sharding/

docs_sync_contract:
  on_status_change:
    - docs/concepts/extension-maturity.md
    - docs/release/roadmap.md
    - specs/extension-maturity.yaml
  on_api_change:
    - docs/modules/x/data/README.md
    - website/src/content/docs/docs/modules/x-data.mdx
    - website/src/content/docs/zh/docs/modules/x-data.mdx
  on_behavior_change:
    - docs/modules/x/data/README.md
