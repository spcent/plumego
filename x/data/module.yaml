name: x/data
path: x/data
layer: extension
status: experimental
owner: persistence
risk: medium
summary: High-level data topology capabilities that should not live in the stable store layer.

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x-data/README.md

subordinate_families:
  - package: x/cache
    role: distributed cache with consistent hashing, replication, failover, and Redis adapter

responsibilities:
  - Read-write splitting orchestration
  - Sharding and routing topology
  - Data access policy composition
  - Tenant-aware topology adapters
  - Durable KV-engine ownership beyond the stable store/kv primitive
  - Durable idempotency provider ownership beyond stable store/idempotency primitives

non_goals:
  - App bootstrap
  - HTTP transport behavior
  - Business repositories
  - Stable store primitives

public_entrypoints:
  - topology
  - routing
  - composition
  - kvengine
  - idempotency

allowed_imports:
  - stdlib
  - contract
  - log
  - metrics
  - store
  - x/tenant

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - examples/**
  - reference/**
  - templates/**
  - cmd/**

test_commands:
  - go test -race -timeout 60s ./x/data/...
  - go test -timeout 20s ./x/data/...
  - go vet ./x/data/...

doc_paths:
  - docs/modules/x-data/README.md

change_risks:
  - topology regression
  - isolation regression
  - persistence correctness regression

stop_conditions:
  - The change introduces business repositories, HTTP transport behavior, or stable store primitives into x/data
  - The change hides topology routing, sharding, or rw-split decisions behind implicit registries or globals
  - The change requires stable store to learn topology ownership that belongs in x/data
  - The change turns x/cache into a competing family entrypoint instead of a subordinate topology package

review_checklist:
  - Keep stable store primitives out of this module
  - Keep topology decisions explicit and reviewable
  - Keep transport concerns out of this module
  - Keep tenant-aware topology and provider ownership explicit
  - Keep durable topology behavior separate from business repository logic

agent_hints:
  - Move sharding and rw orchestration here instead of widening store
  - Keep business repositories and domain-specific dedupe rules in app code, not in x/data
  - x/cache is a subordinate package for distributed/Redis cache topology; start cache work here before opening x/cache directly
