name: x/data/rw
path: x/data/rw
layer: extension
status: experimental
owner: persistence
risk: high
summary: Primary-replica read-write cluster orchestration with explicit primary-routing escapes, optional replica health checking, and configurable fallback behavior.

responsibilities:
  - Primary-replica cluster lifecycle management
  - Read routing to healthy replicas via configurable load balancer
  - Write routing always to primary
  - Transaction-aware routing (transactions always use primary)
  - Replica health checking with configurable thresholds
  - Optional fallback to primary when all replicas are down
  - Per-cluster query metrics

non_goals:
  - Sharding or horizontal partitioning (see x/data/sharding)
  - Storage interface definitions (see store)
  - HTTP transport behavior
  - Business repositories
  - App bootstrap

public_entrypoints:
  - Cluster
  - New
  - Config
  - HealthCheckConfig
  - DefaultHealthCheckConfig
  - LoadBalancer
  - NewRoundRobinBalancer
  - NewWeightedBalancer
  - RoutingPolicy
  - NewSQLTypePolicy
  - NewTransactionAwarePolicy
  - NewAlwaysPrimaryPolicy
  - NewCompositePolicy
  - WithForcePrimary
  - WithPreferReplica
  - WithInTransaction
  - ForcePrimaryFromContext
  - PreferReplicaFromContext
  - InTransactionFromContext

allowed_imports:
  - stdlib
  - database/sql

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - contract/**
  - examples/**
  - reference/**
  - templates/**
  - cmd/**

test_commands:
  - go test -race -timeout 60s ./x/data/rw/...
  - go test -timeout 20s ./x/data/rw/...
  - go vet ./x/data/rw/...

change_risks:
  - topology regression
  - persistence correctness regression
  - concurrent access regression

review_checklist:
  - Writes and transactions must always route to the primary
  - Load balancer must skip unhealthy replicas
  - Health checker must not block query paths
  - FallbackToPrimary behavior must be explicit and tested

agent_hints:
  - Compose with x/data/sharding by passing a Cluster as each shard in the Router
  - Use WithForcePrimary(ctx) for read-after-write visibility; use WithPreferReplica(ctx) only for known-safe reads that should bypass SQL write-detection heuristics
  - DefaultHealthCheckConfig() only applies when HealthCheck.Enabled is true, and FallbackToPrimary should be set explicitly when primary-backed outage reads are acceptable
