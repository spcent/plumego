name: x/tenant
path: x/tenant
layer: extension
status: beta
suggested_gate_profile: single_module_behavior
owner: multitenancy
risk: high
summary: Multi-tenant resolution, policy, quota, rate limit, and tenant-aware adapters.

entrypoint_reads:
  - AGENTS.md
  - docs/reference/canonical-style-guide.md
  - AGENTS.md
  - docs/concepts/x-tenant-blueprint.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x/tenant/README.md

responsibilities:
  - Tenant resolution
  - Tenant policy evaluation
  - Tenant quota management
  - Tenant rate limiting
  - Tenant-aware store adapters
  - Session lifecycle and JWT-backed session state

non_goals:
  - Core app bootstrap
  - Generic middleware registry
  - Generic database abstractions
  - Business tenant onboarding flows

public_entrypoints:
  - resolve
  - policy
  - quota
  - ratelimit
  - config
  - store
  - session

allowed_imports:
  - contract
  - middleware
  - security
  - store
  - log
  - metrics
  - x/resilience

forbidden_imports:
  - core/components/**
  - x/ai/**
  - x/messaging/webhook/**
  - x/websocket/**

test_commands:
  - go test -race -timeout 60s ./x/tenant/...
  - go test -timeout 20s ./x/tenant/...
  - go vet ./x/tenant/...

doc_paths:
  - docs/modules/x/tenant/README.md
  - docs/concepts/x-tenant-blueprint.md

change_risks:
  - isolation regression
  - deny-path regression
  - middleware ordering regression
  - quota feedback regression

stop_conditions:
  - The change requires core, stable middleware, or stable store to learn tenant internals
  - The change introduces business onboarding flows or product-specific tenant policy into x/tenant primitives
  - The change weakens fail-closed tenant policy, quota, or session behavior
  - The change hides tenant resolution or policy flow behind implicit globals or bootstrap magic

review_checklist:
  - Fail closed on tenant policy errors
  - Keep tenant-aware logic out of stable store
  - Keep tenant middleware transport-only
  - Keep Retry-After and remaining-budget headers aligned with quota and rate-limit decisions

agent_hints:
  - Prefer subpackage-local middleware and example-backed resolve/transport flows over new tenant bootstrap shapes
  - Do not require core to know tenant internals
  - Reference apps should not depend on this by default

task_affinity:
  http_endpoint: x/tenant/transport/
  tenant_policy_change: x/tenant/policy/
  tenant: x/tenant/
  bugfix_triage: x/tenant/

landing_zones:
  handler: transport/
  policy: policy/
  quota: quota/
  session: session/
  resolve: resolve/
  rate_limit: ratelimit/
  store: store/
  config: config/

docs_sync_contract:
  on_status_change:
    - docs/concepts/extension-maturity.md
    - docs/release/roadmap.md
    - specs/extension-maturity.yaml
  on_api_change:
    - docs/modules/x/tenant/README.md
    - website/src/content/docs/docs/modules/x-tenant.mdx
    - website/src/content/docs/zh/docs/modules/x-tenant.mdx
  on_behavior_change:
    - docs/modules/x/tenant/README.md
