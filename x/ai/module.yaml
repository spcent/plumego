name: x/ai
path: x/ai
layer: extension
status: experimental
suggested_gate_profile: single_module_behavior
owner: ai-gateway
risk: high
summary: AI gateway capabilities including providers, sessions, streaming, tools, and resilience helpers.

entrypoint_reads:
  - AGENTS.md
  - docs/reference/canonical-style-guide.md
  - AGENTS.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x/ai/README.md

responsibilities:
  - Provider adapters
  - Session and context management
  - Streaming helpers
  - Tool invocation primitives
  - AI-focused resilience and caching helpers

non_goals:
  - Core app bootstrap
  - Stable root-package entrypoints
  - Generic persistence abstractions
  - Business-specific prompt flows

subordinate_families:
  - x/ai/semanticcache

# Stability tiers for subpackages. This block is the single source of truth for
# subpackage maturity; individual subpackage module.yaml files do not repeat it.
# stable       — API is covered by semantic versioning; breaking changes require a major version bump.
# experimental — API may change in future releases without a deprecation period.
stability_tiers:
  stable:
    - provider      # Family tier index; package metadata lives in x/ai/provider/module.yaml
    - session       # Family tier index; package metadata lives in x/ai/session/module.yaml
    - streaming     # Family tier index; package metadata lives in x/ai/streaming/module.yaml
    - tool          # Family tier index; package metadata lives in x/ai/tool/module.yaml
  experimental:
    # foundation tier — depended on by other x/ai packages
    - tokenizer       # Token counting utilities; used by llmcache
    - llmcache        # Exact-key LLM response cache; used by semanticcache and instrumentation

    # composition tier — builds on foundation or x/resilience
    - resilience      # Wraps x/resilience circuit-breaker and rate-limit for provider retry
    - semanticcache   # Embedding-based similarity cache; builds on llmcache for exact fallback
    - instrumentation # Observability decorators for x/ai components

    # feature tier — independent experimental capabilities
    - orchestration   # Agent workflow engine; step types may evolve
    - marketplace     # Agent/workflow registry; installation and rating APIs unfinished
    - distributed     # Distributed execution; queue and persistence contracts not yet stable
    - sse             # SSE transport primitive for streaming AI responses over HTTP
    - filter          # Content filtering chain
    - metrics         # AI-specific metrics interface; convergence with stable metrics tracked in tasks/cards/active/1512-ai-metrics-interface-convergence.md
    - multimodal      # Extended multimodal content types
    - prompt          # Prompt template management

public_entrypoints:
  - provider
  - session
  - streaming
  - tool
  - orchestration
  - resilience

allowed_imports:
  - contract
  - log
  - metrics
  - x/resilience

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/tenant/**
  - x/messaging/webhook/**
  - x/websocket/**

test_commands:
  - go test -race -timeout 60s ./x/ai/...
  - go test -timeout 20s ./x/ai/...
  - go vet ./x/ai/...

doc_paths:
  - docs/modules/x/ai/README.md
  - docs/concepts/caching-layers.md

change_risks:
  - provider compatibility regression
  - streaming behavior regression
  - cache/session correctness regression

stop_conditions:
  - The change introduces core bootstrap ownership, stable entrypoints, or business-specific prompt flows into x/ai primitives
  - The change hides provider selection, session flow, or tool invocation behind globals or implicit registries
  - The change requires core or stable roots to learn AI provider internals
  - The change mixes websocket, webhook, or tenant-specific behavior directly into family-level AI primitives

review_checklist:
  - Keep AI wiring explicit outside core
  - Do not add hidden provider globals
  - Keep transport concerns out of AI packages
  - Keep provider, session, streaming, tool, and resilience boundaries explicit
  - Keep unstable subpackages from leaking into stable-facing contracts

agent_hints:
  - Prefer explicit handler-level composition
  - Keep provider integrations isolated by subpackage
  - Do not require core to know AI internals; keep generic resilience primitives in x/resilience

task_affinity:
  bugfix_triage: x/ai/

landing_zones:
  provider: provider/
  session: session/
  streaming: streaming/
  tool: tool/
  orchestration: orchestration/
  resilience: resilience/
  tokenizer: tokenizer/
  sse: sse/
  filter: filter/
  metrics: metrics/
  multimodal: multimodal/
  prompt: prompt/
  llmcache: llmcache/
  instrumentation: instrumentation/
  semanticcache: semanticcache/
  marketplace: marketplace/
  distributed: distributed/

docs_sync_contract:
  on_status_change:
    - docs/concepts/extension-maturity.md
    - docs/release/roadmap.md
    - specs/extension-maturity.yaml
  on_api_change:
    - docs/modules/x/ai/README.md
    - website/src/content/docs/docs/modules/x-ai.mdx
    - website/src/content/docs/zh/docs/modules/x-ai.mdx
  on_behavior_change:
    - docs/modules/x/ai/README.md
