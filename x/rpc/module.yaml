name: x/rpc
status: experimental
owner: rpc
risk: medium

responsibilities:
  - gRPC server hosting
  - gRPC client pooling
  - HTTP-gRPC gateway adapters

does_not_own:
  - gRPC proto codegen (protoc responsibility)
  - Service implementations (caller responsibility)
  - TLS setup (caller responsibility)

public_entrypoints:
  - Server
  - ClientPool
  - Gateway

validation_commands:
  - go test -timeout 20s ./x/rpc/...
  - go vet ./x/rpc/...

deprecations: []

notes: >
  Optional gRPC server, client, and gateway adapters.
  gRPC integration is caller-owned via explicit wiring.
