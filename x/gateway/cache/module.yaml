name: x/gateway/cache
path: x/gateway/cache
layer: extension
status: beta
parent_family: x/gateway
suggested_gate_profile: single_module_behavior
owner: edge
risk: medium
summary: HTTP response cache for the gateway reverse proxy; keyed by request method, URL, and configurable headers.

responsibilities:
  - HTTP response caching with pluggable key strategies
  - In-memory cache store implementation
  - Cache adapter wiring for gateway proxy

non_goals:
  - Distributed or Redis cache storage (owned by x/data/cache)
  - In-process primitive caching (owned by store/cache)
  - Business freshness or TTL policy decisions

allowed_imports:
  - stdlib
  - contract
  - internal/httputil
  - x/gateway

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - health/**
  - log/**
  - metrics/**
  - x/ai/**
  - x/data/**
  - x/fileapi/**
  - x/frontend/**
  - x/messaging/**
  - x/observability/**
  - x/openapi/**
  - x/resilience/**
  - x/rest/**
  - x/rpc/**
  - x/tenant/**
  - x/validate/**

test_commands:
  - go test -race -timeout 60s ./x/gateway/cache/...
  - go vet ./x/gateway/cache/...

review_checklist:
  - Keep cache key derivation collision-free and scheme/host/path aware
  - Honor TTL and never serve responses past their intended expiry
  - Keep caching opt-in and separate from upstream proxy logic

agent_hints:
  - Wire caching as an explicit gateway stage, not implicit global behavior
  - Keep cache storage swappable behind the package interface
