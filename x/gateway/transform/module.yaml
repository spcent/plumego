name: x/gateway/transform
path: x/gateway/transform
layer: extension
status: beta
parent_family: x/gateway
suggested_gate_profile: single_module_behavior
owner: edge
risk: medium
summary: Request and response transformation helpers for the gateway; header injection, body rewriting, and path normalization.

responsibilities:
  - Header injection and removal transforms
  - Response body rewriting (prefix strip, host replacement)
  - Path normalization helpers

non_goals:
  - Routing decisions (owned by x/gateway proxy)
  - Business logic transforms
  - Protocol transcoding (owned by x/gateway/protocol)

allowed_imports:
  - stdlib
  - contract
  - internal/httputil
  - x/gateway

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - health/**
  - log/**
  - metrics/**
  - x/ai/**
  - x/data/**
  - x/fileapi/**
  - x/frontend/**
  - x/messaging/**
  - x/observability/**
  - x/openapi/**
  - x/resilience/**
  - x/rest/**
  - x/rpc/**
  - x/tenant/**
  - x/validate/**

test_commands:
  - go test -race -timeout 60s ./x/gateway/transform/...
  - go vet ./x/gateway/transform/...

review_checklist:
  - Keep transforms explicit and order-independent where possible
  - Route error and response shaping through contract
  - Avoid coupling transforms to specific upstreams

agent_hints:
  - Add transform steps here, not inline in proxy wiring
  - Use contract helpers for any error output
