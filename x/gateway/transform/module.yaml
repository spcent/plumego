name: x/gateway/transform
path: x/gateway/transform
layer: extension
status: beta
parent_family: x/gateway
suggested_gate_profile: single_module_behavior
owner: edge
risk: medium
summary: Request and response transformation helpers for the gateway; header injection, body rewriting, and path normalization.

responsibilities:
  - Header injection and removal transforms
  - Response body rewriting (prefix strip, host replacement)
  - Path normalization helpers

non_goals:
  - Routing decisions (owned by x/gateway proxy)
  - Business logic transforms
  - Protocol transcoding (owned by x/gateway/protocol)

allowed_imports:
  - stdlib
  - contract
  - internal/httputil
  - internal/httpx
  - x/gateway

test_commands:
  - go test -race -timeout 60s ./x/gateway/transform/...
  - go vet ./x/gateway/transform/...

forbidden_imports:
  - core/**
  - store/**
  - x/tenant/**
  - x/ai/**
  - x/messaging/**
  - x/observability/**

review_checklist:
  - Keep transforms pure, composable, and side-effect-free
  - Do not add routing decisions to transform helpers
  - Keep body rewriting helpers explicit and covered by tests

agent_hints:
  - Transforms are value operations; prefer immutable helpers over in-place mutation
  - Keep path normalization and header transforms in separate focused helpers
