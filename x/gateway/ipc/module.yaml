name: x/gateway/ipc
path: x/gateway/ipc
layer: extension
status: experimental
suggested_gate_profile: single_module_behavior
owner: edge
risk: medium
summary: Subordinate inter-process communication transport helpers within the x/gateway family.

parent_family: x/gateway

responsibilities:
  - IPC message transport
  - IPC client/server helpers
  - Explicit IPC adapters

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business workflow orchestration

public_entrypoints:
  - Error
  - Config
  - MetricsObserver
  - DefaultConfig
  - Option
  - WithConnectTimeout
  - WithReadTimeout
  - WithWriteTimeout
  - WithBufferSize
  - WithTimeouts
  - WithKeepAlive
  - WithKeepAlivePeriod
  - WithMetrics
  - WithLogger
  - Addr
  - NewAddr
  - RateLimiter
  - NewRateLimiter
  - NewRateLimitedServer
  - Reader
  - Writer
  - AddrProvider
  - Client
  - Dial
  - DialWithContext
  - FramedClient
  - NewFramedClient
  - Server
  - NewServer
  - PoolConfig
  - DefaultPoolConfig
  - Pool
  - NewPool
  - PoolStats
  - StreamConfig
  - DefaultStreamConfig
  - StreamClient
  - NewStreamClient
  - HeartbeatConfig
  - DefaultHeartbeatConfig
  - NewHeartbeatClient
  - ReconnectConfig
  - DefaultReconnectConfig
  - DialWithReconnect

allowed_imports:
  - contract
  - log

forbidden_imports:
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/gateway/ipc/...
  - go test -timeout 20s ./x/gateway/ipc/...
  - go vet ./x/gateway/ipc/...

doc_paths:
  - docs/modules/x/gateway/README.md

review_checklist:
  - Keep transport contracts explicit
  - Avoid hidden process-wide side effects
  - Preserve failure visibility

agent_hints:
  - Treat x/gateway/ipc as a primitive root, not a user-facing capability entrypoint
  - Treat x/gateway/ipc as a subordinate of x/gateway; start IPC-facing work in x/gateway before opening this package directly
  - Keep IPC internals self-contained with narrow adapters and out of core

landing_zones:
  server: server.go
  client: client.go
  pool: pool.go
