name: x/gateway
path: x/gateway
layer: extension
status: experimental
summary: API gateway, proxy, balancing, caching, and edge transport helpers.

responsibilities:
  - Reverse proxy helpers
  - Gateway routing and rewriting
  - Balancing and cache adapters
  - Gateway health helpers
  - Canonical app-facing gateway entrypoints and explicit route helpers

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business-specific gateway policy

allowed_imports:
  - contract
  - health
  - log
  - metrics
  - middleware
  - security
  - store

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/gateway/...
  - go test -timeout 20s ./x/gateway/...
  - go vet ./x/gateway/...

doc_paths:
  - docs/modules/x-gateway/README.md

review_checklist:
  - Keep proxy behavior explicit
  - Avoid hidden globals
  - Preserve transport determinism

agent_hints:
  - Treat x/gateway as the canonical entrypoint for gateway and edge transport work
  - Use x/gateway entrypoints for app-facing proxy wiring and keep helpers adapter-local
  - Route reusable resource-interface work to x/rest rather than mixing it into gateway
