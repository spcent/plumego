name: x/gateway
path: x/gateway
layer: extension
status: beta
suggested_gate_profile: single_module_behavior
owner: edge
risk: medium
summary: The canonical and only app-facing gateway and edge transport entrypoint for proxying, balancing, caching, and rewrite helpers.

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x-gateway/README.md

subordinate_families:
  - package: x/gateway/discovery
    role: service instance discovery, resolver helpers, and discovery adapters
  - package: x/gateway/ipc
    role: inter-process communication transport helpers

responsibilities:
  - Reverse proxy helpers
  - Gateway routing and rewriting
  - Balancing and cache adapters
  - Gateway health helpers
  - Canonical app-facing gateway entrypoints and explicit route helpers

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business-specific gateway policy

public_entrypoints:
  - gateway
  - proxy
  - cache
  - rewrite
  - discovery
  - ipc

allowed_imports:
  - contract
  - health
  - log
  - metrics
  - middleware
  - security
  - store

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/gateway/...
  - go test -timeout 20s ./x/gateway/...
  - go vet ./x/gateway/...

doc_paths:
  - docs/modules/x-gateway/README.md

change_risks:
  - proxy rewrite regression
  - cache policy regression
  - edge routing regression

stop_conditions:
  - The change introduces hidden proxy globals, auto-registration, or bootstrap ownership into x/gateway
  - The change mixes reusable resource APIs, tenant policy, or business-specific edge behavior into family-level gateway helpers
  - The change requires stable roots to learn discovery, IPC, or gateway cache topology details
  - The change makes x/gateway/discovery or x/gateway/ipc compete with x/gateway as app-facing entrypoints

review_checklist:
  - Keep proxy behavior explicit
  - Avoid hidden globals
  - Preserve transport determinism
  - Keep gateway route wiring and rewrite policy explicit
  - Keep reusable resource-interface work in x/rest, not x/gateway

agent_hints:
  - Treat x/gateway as the only app-facing entrypoint for gateway and edge transport work
  - x/gateway/discovery and x/gateway/ipc are subordinate packages; start discovery and IPC work here before opening them directly
  - Route reusable resource-interface work to x/rest rather than mixing it into gateway

task_affinity:
  gateway_edge_transport: x/gateway/
  service_discovery: x/gateway/discovery/
  bugfix_triage: x/gateway/

landing_zones:
  proxy: proxy.go
  entrypoint: entrypoints.go
  discovery: discovery/
  ipc: ipc/

docs_sync_contract:
  on_status_change:
    - docs/EXTENSION_MATURITY.md
    - docs/ROADMAP.md
    - specs/extension-maturity.yaml
  on_api_change:
    - docs/modules/x-gateway/README.md
    - website/src/content/docs/docs/modules/x-gateway.mdx
    - website/src/content/docs/zh/docs/modules/x-gateway.mdx
  on_behavior_change:
    - docs/modules/x-gateway/README.md
