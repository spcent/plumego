name: x/gateway/protocolmw
path: x/gateway/protocolmw
layer: extension
status: beta
parent_family: x/gateway
suggested_gate_profile: single_module_behavior
owner: edge
risk: medium
summary: Protocol-aware middleware for the gateway; applies protocol-specific request/response transforms in the proxy pipeline.

responsibilities:
  - Protocol-specific middleware adapters for gateway pipelines
  - Request/response rewrite hooks per protocol

non_goals:
  - Generic HTTP middleware (owned by middleware/)
  - Protocol adapter logic (owned by x/gateway/protocol)
  - Business policy enforcement

allowed_imports:
  - stdlib
  - contract
  - middleware
  - x/gateway
  - x/gateway/protocol

forbidden_imports:
  - core/**
  - router/**
  - security/**
  - store/**
  - health/**
  - log/**
  - metrics/**
  - x/ai/**
  - x/data/**
  - x/fileapi/**
  - x/frontend/**
  - x/messaging/**
  - x/observability/**
  - x/openapi/**
  - x/resilience/**
  - x/rest/**
  - x/rpc/**
  - x/tenant/**
  - x/validate/**
  - x/websocket/**

test_commands:
  - go test -race -timeout 60s ./x/gateway/protocolmw/...
  - go vet ./x/gateway/protocolmw/...

review_checklist:
  - Keep middleware transport-only with no business policy
  - Reuse x/gateway/protocol detection instead of re-implementing it
  - Preserve net/http handler semantics

agent_hints:
  - Compose protocol handling as middleware in the gateway chain
  - Source protocol decisions from x/gateway/protocol
