name: x/gateway/protocol
path: x/gateway/protocol
layer: extension
status: beta
parent_family: x/gateway
suggested_gate_profile: single_module_behavior
owner: edge
risk: medium
summary: Protocol adapter layer for the gateway; bridges HTTP/1.1 reverse proxy to gRPC and GraphQL upstream backends.

responsibilities:
  - HTTP-to-gRPC transcoding adapter
  - GraphQL introspection and query forwarding adapter

non_goals:
  - gRPC server or client pool (owned by x/rpc)
  - Business GraphQL schema definition
  - Authentication (owned by middleware/auth and security)

allowed_imports:
  - stdlib
  - contract
  - x/gateway

test_commands:
  - go test -race -timeout 60s ./x/gateway/protocol/...
  - go vet ./x/gateway/protocol/...

forbidden_imports:
  - core/**
  - store/**
  - x/tenant/**
  - x/ai/**
  - x/messaging/**
  - x/observability/**

review_checklist:
  - Keep protocol adapters stateless and composable
  - Do not mix gRPC server logic with transcoding adapters
  - Keep authentication out of protocol adapters (owned by middleware/auth)

agent_hints:
  - Each protocol adapter is a separate type; keep them isolated from each other
  - GraphQL and gRPC adapters share the gateway interface but must not share internal state
