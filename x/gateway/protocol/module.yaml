name: x/gateway/protocol
path: x/gateway/protocol
layer: extension
status: beta
parent_family: x/gateway
suggested_gate_profile: single_module_behavior
owner: edge
risk: medium
summary: Protocol adapter layer for the gateway; bridges HTTP/1.1 reverse proxy to gRPC and GraphQL upstream backends.

responsibilities:
  - HTTP-to-gRPC transcoding adapter
  - GraphQL introspection and query forwarding adapter

non_goals:
  - gRPC server or client pool (owned by x/rpc)
  - Business GraphQL schema definition
  - Authentication (owned by middleware/auth and security)

allowed_imports:
  - stdlib
  - contract
  - x/gateway

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - health/**
  - log/**
  - metrics/**
  - x/ai/**
  - x/data/**
  - x/fileapi/**
  - x/frontend/**
  - x/messaging/**
  - x/observability/**
  - x/openapi/**
  - x/resilience/**
  - x/rest/**
  - x/rpc/**
  - x/tenant/**
  - x/validate/**

test_commands:
  - go test -race -timeout 60s ./x/gateway/protocol/...
  - go vet ./x/gateway/protocol/...

review_checklist:
  - Keep protocol detection deterministic and side-effect free
  - Do not embed transport, proxy, or middleware logic here

agent_hints:
  - Treat this as the protocol vocabulary consumed by x/gateway/protocolmw
  - Add new protocol kinds here rather than in middleware
