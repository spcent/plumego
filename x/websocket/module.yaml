name: x/websocket
path: x/websocket
layer: extension
status: beta
suggested_gate_profile: single_module_behavior
owner: realtime
risk: medium
summary: WebSocket extension surface for hub primitives, explicit route registration, and RFC 6455 client dialing.

entrypoint_reads:
  - AGENTS.md
  - docs/reference/canonical-style-guide.md
  - AGENTS.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x/websocket/README.md

responsibilities:
  - WebSocket route registration
  - App-facing hub aliases
  - Auth and broadcast entrypoints
  - Default websocket configuration
  - RFC 6455 client handshake (Dial)

non_goals:
  - Core bootstrap ownership
  - Generic event bus abstractions
  - Stable root-package entrypoints
  - Business-specific websocket channels

