allowed_imports:
  - contract
  - health
  - log
  - middleware
  - router
  - security

forbidden_imports:
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/websocket/...
  - go test -timeout 20s ./x/websocket/...
  - go vet ./x/websocket/...

doc_paths:
  - docs/modules/x/websocket/README.md

change_risks:
  - websocket auth regression
  - broadcast behavior regression
  - connection lifecycle regression

stop_conditions:
  - The change introduces core bootstrap ownership, generic event-bus abstractions, or business channels into x/websocket
  - The change weakens auth flow, origin checks, or secret handling around websocket setup
  - The change hides route mounting or hub setup behind implicit globals or package init behavior
  - The change requires stable roots to absorb websocket-specific lifecycle behavior

review_checklist:
  - Keep auth explicit
  - Do not weaken secret checks
  - Keep app-level mounting explicit
  - Keep connection lifecycle and broadcast behavior reviewable
  - Keep websocket setup out of stable roots

agent_hints:
  - Use x/websocket for app-facing imports
  - The implementation now lives directly in x/websocket
  - Keep websocket setup out of core

task_affinity:
  websocket: x/websocket/
  bugfix_triage: x/websocket/

landing_zones:
  hub: hub.go
  server: server.go
  auth: auth.go
  security: security.go
  client_dial: dial.go

docs_sync_contract:
  on_status_change:
    - docs/concepts/extension-maturity.md
    - docs/release/roadmap.md
    - specs/extension-maturity.yaml
  on_api_change:
    - docs/modules/x/websocket/README.md
    - website/src/content/docs/docs/modules/x-websocket.mdx
    - website/src/content/docs/zh/docs/modules/x-websocket.mdx
  on_behavior_change:
    - docs/modules/x/websocket/README.md
