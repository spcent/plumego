name: x/frontend
path: x/frontend
layer: extension
status: beta
suggested_gate_profile: single_module_behavior
owner: frontend
risk: medium
summary: Static and embedded frontend serving helpers for explicit mounting.
# Stable promotion blockers:
# - release-backed exported API snapshots for Registrar, Mount and its methods, constructors, registration helpers, and sealed With* options
# - current-head snapshots and gates are development evidence only
# - two consecutive minor release refs without exported x/frontend API churn
# - frontend owner sign-off
# - passing repository release gate from the final candidate release state; current head gate evidence is recorded in docs/extension-evidence/x-frontend.md

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x/frontend/README.md

responsibilities:
  - Static asset mounting
  - Embedded asset serving
  - Frontend fallback helpers
  - Frontend asset cache and header policy
  - Precompressed asset serving policy

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business-specific UI flows
  - Router matching primitives

public_entrypoints:
  - Mount
  - Registrar
  - RegisterFromDir
  - NewMountFromDir
  - RegisterFS
  - NewMountFS
  - NewHandlerFS
  - (*Mount).Prefix
  - (*Mount).Handler
  - (*Mount).Register
  - Option
  - WithPrefix
  - WithIndex
  - WithCacheControl
  - WithIndexCacheControl
  - WithFallback
  - WithHeaders
  - WithPrecompressed
  - PrecompressedVariantMiss
  - WithPrecompressedVariantMissHandler
  - PrecompressedVariants
  - WithPrecompressedVariantPlan
  - WithNotFoundPage
  - WithErrorPage
  - WithMIMETypes

allowed_imports:
  - contract
  - log
  - router

forbidden_imports:
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/frontend/...
  - go test -timeout 20s ./x/frontend/...
  - go vet ./x/frontend/...

doc_paths:
  - docs/modules/x/frontend/README.md

change_risks:
  - asset fallback regression
  - path traversal or symlink escape regression
  - cache header regression
  - compression negotiation and Vary regression
  - mutable directory asset update atomicity surprise
  - custom filesystem lazy probing or explicit variant-plan regression
  - precompressed variant miss hook regression
  - AddRoute-only registrar partial registration surprise
  - custom error page cache regression
  - embedded asset regression

stop_conditions:
  - The change introduces core bootstrap ownership, business UI flows, or router matching primitives into x/frontend
  - The change hides filesystem behavior, fallback policy, or cache policy behind implicit side effects
  - The change requires stable roots to absorb frontend asset serving behavior
  - The change mixes app-specific frontend composition into reusable transport helpers

review_checklist:
  - Keep mounting explicit
  - Avoid hidden filesystem side effects, including symlink escapes
  - Preserve net/http compatibility, including Accept-Encoding and Vary behavior
  - Keep cache and fallback policy explicit
  - Keep frontend helpers transport-only

agent_hints:
  - Keep frontend setup outside core
  - Preserve explicit fallback behavior
  - Prefer transport-only helpers

task_affinity:
  frontend_asset_serving: x/frontend/
  bugfix_triage: x/frontend/

landing_zones:
  mount: mount.go
  config: config.go
  response: response.go
  compression: compression.go
  paths: paths.go

docs_sync_contract:
  on_status_change:
    - docs/EXTENSION_MATURITY.md
    - docs/ROADMAP.md
    - specs/extension-maturity.yaml
  on_api_change:
    - docs/modules/x-frontend/README.md
    - website/src/content/docs/docs/modules/x-frontend.mdx
    - website/src/content/docs/zh/docs/modules/x-frontend.mdx
  on_behavior_change:
    - docs/modules/x-frontend/README.md
