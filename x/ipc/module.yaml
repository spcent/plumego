name: x/ipc
path: x/ipc
layer: extension
status: experimental
owner: edge
risk: medium
summary: Subordinate inter-process communication transport helpers within the x/gateway family.

parent_family: x/gateway

responsibilities:
  - IPC message transport
  - IPC client/server helpers
  - Explicit IPC adapters

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business workflow orchestration

allowed_imports:
  - contract
  - log

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/ipc/...
  - go test -timeout 20s ./x/ipc/...
  - go vet ./x/ipc/...

doc_paths:
  - docs/modules/x-ipc/README.md

review_checklist:
  - Keep transport contracts explicit
  - Avoid hidden process-wide side effects
  - Preserve failure visibility

agent_hints:
  - Treat x/ipc as a primitive root, not a user-facing capability entrypoint
  - Treat x/ipc as a subordinate of x/gateway; start IPC-facing work in x/gateway before opening this package directly
  - Keep IPC internals self-contained with narrow adapters and out of core
