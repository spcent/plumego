name: x/openapi
status: experimental
owner: api
risk: medium

responsibilities:
  - OpenAPI 3.1 spec generation from route metadata
  - Schema inference from Go types
  - Spec validation
  - JSON/YAML serialization

does_not_own:
  - Route registration (owned by core/router)
  - HTTP transport (owned by core)
  - Document hosting (caller responsibility)

public_entrypoints:
  - NewGenerator
  - Generator.Spec
  - Generator.WriteJSON
  - Generator.WriteYAML

validation_commands:
  - go test -timeout 20s ./x/openapi/...
  - go vet ./x/openapi/...

deprecations: []

notes: >
  OpenAPI 3.1 generator with dependency-free JSON/YAML serialization.
  No third-party schema validation dependencies.
