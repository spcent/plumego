name: x/messaging/webhook
path: x/messaging/webhook
layer: extension
status: experimental
suggested_gate_profile: single_module_behavior
owner: integration
risk: medium
summary: Subordinate webhook ingress, egress, and bridge primitives within the broader messaging extension family.

parent_family: x/messaging

responsibilities:
  - Inbound webhook verification helpers
  - Outbound webhook delivery service aliases
  - Explicit inbound and outbound route registration
  - PubSub-to-webhook bridge wiring

non_goals:
  - Core bootstrap ownership
  - Generic messaging abstractions
  - Stable root-package entrypoints
  - Business-specific webhook workflows
  - Canonical family discovery for general messaging work

public_entrypoints:
  - NewService
  - NewMemStore
  - VerifyHMAC
  - VerifyGitHub
  - VerifyStripe

allowed_imports:
  - contract
  - middleware
  - router
  - health
  - log
  - x/messaging/pubsub

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/messaging/webhook/...
  - go test -timeout 20s ./x/messaging/webhook/...
  - go vet ./x/messaging/webhook/...

doc_paths:
  - docs/modules/x-messaging/README.md

change_risks:
  - signature verification regression
  - delivery retry regression
  - route registration regression

review_checklist:
  - Fail closed on verification errors
  - Keep secrets out of logs
  - Keep app-level mounting explicit

agent_hints:
  - Start new app-facing messaging feature discovery in x/messaging before opening x/messaging/webhook
  - Open x/messaging/webhook directly only for narrow inbound verification or outbound delivery work
  - Keep webhook transport concerns explicit and local without turning x/messaging/webhook into a family discovery root

landing_zones:
  inbound: in.go
  outbound: out.go
  bridge: bridge.go
  config: config.go
