name: x/messaging
path: x/messaging
layer: extension
status: experimental
owner: messaging
risk: medium
summary: The canonical and only app-facing messaging family entrypoint, built on explicit queue, pubsub, scheduler, and webhook adapters.

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x-messaging/README.md

subordinate_families:
  - package: x/mq
    role: durable queue primitive and worker coordination
  - package: x/pubsub
    role: in-process publish-subscribe broker primitives
  - package: x/scheduler
    role: cron, delayed job, and retry coordination
  - package: x/webhook
    role: inbound verification and outbound delivery

responsibilities:
  - Message send orchestration
  - Delivery provider abstraction
  - Scheduling and queue coordination
  - Receipt and stats APIs
  - Canonical family entrypoints for broker, webhook, and HTTP route wiring

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Tenant bootstrap policy

public_entrypoints:
  - send
  - delivery
  - schedule
  - webhook
  - broker
  - routes

allowed_imports:
  - contract
  - log
  - metrics
  - store
  - x/mq
  - x/pubsub
  - x/scheduler
  - x/webhook

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/messaging/...
  - go test -timeout 20s ./x/messaging/...
  - go vet ./x/messaging/...

doc_paths:
  - docs/modules/x-messaging/README.md

change_risks:
  - delivery regression
  - scheduling regression
  - webhook flow regression

stop_conditions:
  - The change introduces hidden provider globals, tenant bootstrap ownership, or stable-root entrypoints into x/messaging
  - The change mixes business workflow policy into family-level messaging primitives
  - The change requires core or stable roots to learn mq, pubsub, scheduler, or webhook internals
  - The change makes subordinate families compete with x/messaging as app-facing discovery entrypoints

review_checklist:
  - Keep message flow explicit
  - Avoid hidden provider globals
  - Preserve error-path visibility
  - Keep route wiring and delivery orchestration explicit
  - Keep mq, pubsub, scheduler, and webhook ownership clear at the family boundary

agent_hints:
  - Start all new app-facing messaging discovery here before opening sibling x/* packages
  - Keep orchestration inside x/messaging with explicit service wiring and family-level entrypoints
  - Treat x/mq, x/pubsub, x/scheduler, and x/webhook as subordinate packages under this family, not competing entrypoints
