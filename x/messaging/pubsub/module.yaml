name: x/messaging/pubsub
path: x/messaging/pubsub
layer: extension
status: experimental
owner: messaging
risk: medium
summary: Subordinate in-process publish-subscribe primitives used by x/messaging, x/messaging/webhook, and local debugging support.

parent_family: x/messaging

responsibilities:
  - Publish-subscribe broker primitives
  - Topic fan-out helpers
  - Debug-friendly broker support

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business event workflow logic

allowed_imports:
  - log
  - metrics
  - x/resilience

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/messaging/pubsub/...
  - go test -timeout 20s ./x/messaging/pubsub/...
  - go vet ./x/messaging/pubsub/...

doc_paths:
  - docs/modules/x-messaging/README.md

review_checklist:
  - Keep pubsub semantics explicit
  - Avoid hidden global brokers
  - Preserve fan-out determinism

agent_hints:
  - Treat x/messaging/pubsub as a subordinate primitive package; start new messaging feature discovery in x/messaging
  - Prefer local broker injection and keep pubsub transport-agnostic
  - Do not use x/messaging/pubsub as a competing family entrypoint for new messaging work or move brokers into core

landing_zones:
  broker: broker.go
  pubsub: pubsub.go
  persistence: persistence.go
