name: x/fileapi
path: x/fileapi
layer: extension
status: experimental
owner: persistence
risk: medium
summary: HTTP handler for tenant-aware file operations, composing x/data/file storage and metadata.

responsibilities:
  - HTTP transport layer for file upload, download, info, URL, delete, list
  - Tenant extraction from request context
  - Multipart form parsing and request validation
  - Streaming file delivery

non_goals:
  - Storage interface definitions (store/file)
  - Tenant-aware storage implementations (x/data/file)
  - Business repositories
  - App bootstrap or route registration policy

public_entrypoints:
  - Handler
  - NewHandler

allowed_imports:
  - stdlib
  - contract
  - store/file
  - x/data/file

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - examples/**
  - reference/**
  - templates/**
  - cmd/**

test_commands:
  - go test -race -timeout 60s ./x/fileapi/...
  - go test -timeout 20s ./x/fileapi/...
  - go vet ./x/fileapi/...

doc_paths:
  - docs/modules/x-fileapi/README.md

review_checklist:
  - Tenant extraction must come from context, never from request body or path
  - All handler methods must use contract.WriteError for error responses
  - No business logic in handlers; delegate to Storage and MetadataManager

agent_hints:
  - Wire this handler in your application's routes.go; do not call RegisterRoutes from library code
  - Inject a tenant middleware before file routes to populate "tenant_id" in context
  - Use x/data/file.NewLocalStorage or x/data/file.NewS3Storage as the Storage implementation
