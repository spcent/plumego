name: x/fileapi
status: experimental
owner: persistence
risk: medium

responsibilities:
  - HTTP endpoints for file operations
  - File upload/download transport
  - Temporary URL generation

does_not_own:
  - Storage implementation (owned by x/data/file or caller)
  - Access control (middleware responsibility)
  - File system operations (caller responsibility)

public_entrypoints:
  - Handler
  - Upload
  - Download
  - TempURL

validation_commands:
  - go test -timeout 20s ./x/fileapi/...
  - go vet ./x/fileapi/...

deprecations: []

notes: >
  HTTP file transport over x/data/file and stable store/file contracts.
  Requires explicit storage backend wiring.
