name: x/ops
path: x/ops
layer: extension
status: experimental
summary: Protected operations endpoints for queues, receipts, and runtime diagnostics.

responsibilities:
  - Ops route registration
  - Queue and receipt admin hooks
  - Explicit auth-gated diagnostics

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Tenant bootstrap policy

allowed_imports:
  - contract
  - health
  - log
  - metrics
  - middleware
  - router

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/ops/...
  - go test -timeout 20s ./x/ops/...
  - go vet ./x/ops/...

doc_paths:
  - docs/modules/x-ops/README.md

review_checklist:
  - Keep ops endpoints explicit
  - Preserve auth boundaries
  - Avoid hidden admin side effects

agent_hints:
  - Use x/ops for protected admin endpoints only; start broader observability discovery in x/observability
  - Keep ops routing outside core and prefer hook-based behavior
  - Fail closed on auth errors
