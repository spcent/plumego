name: x/mq
path: x/mq
layer: extension
status: experimental
summary: Durable queue primitives and worker coordination used by the broader x/messaging capability pack.

responsibilities:
  - Queue primitives
  - Task persistence
  - Worker coordination
  - Dead-letter handling

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business workflow orchestration

allowed_imports:
  - contract
  - log
  - metrics
  - store
  - x/pubsub

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/mq/...
  - go test -timeout 20s ./x/mq/...
  - go vet ./x/mq/...

review_checklist:
  - Keep queue semantics explicit
  - Avoid hidden background side effects
  - Preserve persistence correctness

agent_hints:
  - Treat x/mq as a lower-level queue primitive; start feature discovery in x/messaging
  - Keep queue adapters local with explicit worker wiring
  - Do not use x/mq as the first user-facing entrypoint for new messaging work or move it into core
