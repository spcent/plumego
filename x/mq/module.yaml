name: x/mq
path: x/mq
layer: extension
status: experimental
summary: Queue primitives, persistence adapters, and worker coordination for asynchronous delivery.

responsibilities:
  - Queue primitives
  - Task persistence
  - Worker coordination
  - Dead-letter handling

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business workflow orchestration

allowed_imports:
  - contract
  - log
  - metrics
  - store
  - x/pubsub

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/mq/...
  - go test -timeout 20s ./x/mq/...
  - go vet ./x/mq/...

review_checklist:
  - Keep queue semantics explicit
  - Avoid hidden background side effects
  - Preserve persistence correctness

agent_hints:
  - Keep queue adapters local
  - Prefer explicit worker wiring
  - Do not move MQ into core
