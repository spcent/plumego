name: x/observability
path: x/observability
layer: extension
status: beta
suggested_gate_profile: single_module_behavior
owner: observability
risk: medium
summary: The only app-facing entrypoint for broader observability adapters and export wiring; transport observability primitives remain in stable middleware packages.

entrypoint_reads:
  - AGENTS.md
  - docs/reference/canonical-style-guide.md
  - docs/concepts/agent-first-repo-blueprint.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x/observability/README.md

subordinate_families:
  - package: x/observability/ops
    role: protected auth-gated admin and diagnostics endpoints
  - package: x/observability/devtools
    role: debug-only routes, env reload helpers, and local profiling

responsibilities:
  - Observability adapters
  - Optional instrumentation helpers
  - Export pipeline wiring
  - Non-stable observability support helpers such as record buffering, rolling-window aggregation, metrics testkits, and DB analytics helpers

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business metrics policy
  - Transport-only middleware primitives

public_entrypoints:
  - ObservabilityConfig
  - DefaultObservabilityConfig
  - MetricsConfig
  - DefaultMetricsConfig
  - TracingConfig
  - DefaultTracingConfig
  - Hooks
  - Configure
  - PrometheusCollector
  - NewPrometheusCollector
  - PrometheusExporter
  - NewPrometheusExporter
  - NewPrometheusExporter
  - OpenTelemetryTracer
  - NewOpenTelemetryTracer
  - Exporter
  - ops
  - devtools
  - recordbuffer
  - windowmetrics
  - testmetrics
  - testlog
  - featuremetrics
  - dbinsights
  - tracer

allowed_imports:
  - contract
  - log
  - metrics
  - middleware
  - store

forbidden_imports:
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/observability/...
  - go test -timeout 20s ./x/observability/...
  - go vet ./x/observability/...

doc_paths:
  - docs/modules/x/observability/README.md

change_risks:
  - export wiring regression
  - metrics buffering regression
  - diagnostics isolation regression

stop_conditions:
  - The change introduces core bootstrap ownership, business metrics policy, or stable transport primitives into x/observability
  - The change hides export behavior, adapter wiring, or record buffering behind package globals
  - The change requires stable middleware, metrics, or log to absorb observability capability-pack behavior
  - The change makes x/observability/ops or x/observability/devtools compete with x/observability as the family entrypoint

review_checklist:
  - Keep export behavior explicit
  - Avoid hidden globals
  - Preserve observability isolation
  - Keep stable middleware focused on transport primitives
  - Keep x/observability/ops and x/observability/devtools subordinate to this family entrypoint

agent_hints:
  - Start broader observability adapter and export work here; x/observability/ops and x/observability/devtools are subordinate packages
  - Start transport observability primitives in middleware/requestid, middleware/tracing, middleware/httpmetrics, or middleware/accesslog; keep broader record-buffering and export helpers here
  - Keep adapter-local helpers explicit and do not turn middleware into an observability catalog

task_affinity:
  observability_admin: x/observability/
  devtools_local_debug: x/observability/devtools/
  ops_admin_surface: x/observability/ops/
  bugfix_triage: x/observability/

landing_zones:
  adapter: observability.go
  exporter: exporter.go
  ops: ops/
  devtools: devtools/

docs_sync_contract:
  on_status_change:
    - docs/concepts/extension-maturity.md
    - docs/release/roadmap.md
    - specs/extension-maturity.yaml
  on_api_change:
    - docs/modules/x/observability/README.md
    - website/src/content/docs/docs/modules/x-observability.mdx
    - website/src/content/docs/zh/docs/modules/x-observability.mdx
  on_behavior_change:
    - docs/modules/x/observability/README.md
