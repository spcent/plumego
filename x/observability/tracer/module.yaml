name: x/observability/tracer
path: x/observability/tracer
layer: extension
status: beta
parent_family: x/observability
suggested_gate_profile: single_module_behavior
owner: observability
risk: medium
summary: OpenTelemetry tracer setup and configuration helpers; wires distributed tracing into the app lifecycle.

responsibilities:
  - Tracer construction and provider configuration
  - OpenTelemetry exporter setup (OTLP, stdout, etc.)
  - Span propagation helpers

non_goals:
  - Transport-layer tracing (owned by middleware/tracing)
  - Metrics collection (owned by metrics stable root)
  - Business observability policy

allowed_imports:
  - stdlib
  - log
  - x/observability

test_commands:
  - go test -race -timeout 60s ./x/observability/tracer/...
  - go vet ./x/observability/tracer/...

forbidden_imports:
  - x/tenant/**
  - x/ai/**
  - x/gateway/**

review_checklist:
  - Keep tracer setup and provider configuration explicit in the app lifecycle
  - Do not add hidden global tracer state; pass the tracer via context or constructor injection
  - Keep transport-layer tracing in middleware/tracing; keep provider configuration here

agent_hints:
  - Wire the tracer provider in main.go lifecycle (Start/Shutdown), not in init() or package-level vars
  - Span propagation helpers belong in middleware/tracing; keep configuration and exporter setup here
