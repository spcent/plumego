name: x/observability/tracer
path: x/observability/tracer
layer: extension
status: beta
parent_family: x/observability
suggested_gate_profile: single_module_behavior
owner: observability
risk: medium
summary: OpenTelemetry tracer setup and configuration helpers; wires distributed tracing into the app lifecycle.

responsibilities:
  - Tracer construction and provider configuration
  - OpenTelemetry exporter setup (OTLP, stdout, etc.)
  - Span propagation helpers

non_goals:
  - Transport-layer tracing (owned by middleware/tracing)
  - Metrics collection (owned by metrics stable root)
  - Business observability policy

allowed_imports:
  - stdlib
  - log
  - x/observability

forbidden_imports:
  - core/**
  - router/**
  - contract/**
  - middleware/**
  - security/**
  - store/**
  - health/**
  - metrics/**
  - x/ai/**
  - x/data/**
  - x/fileapi/**
  - x/frontend/**
  - x/gateway/**
  - x/messaging/**
  - x/openapi/**
  - x/resilience/**
  - x/rest/**
  - x/rpc/**
  - x/tenant/**
  - x/validate/**

test_commands:
  - go test -race -timeout 60s ./x/observability/tracer/...
  - go vet ./x/observability/tracer/...

review_checklist:
  - Keep trace context propagation aligned with contract.TraceContext
  - Keep sampling decisions deterministic and configurable
  - Do not leak span internals across the public surface
  - Fail safe when no tracer is configured

agent_hints:
  - Read and write trace context via contract.TraceContext, not ad hoc keys
  - Keep exporter and backend wiring in application code
  - Start spans explicitly; avoid implicit global tracers
