name: x/observability/testmetrics
path: x/observability/testmetrics
layer: extension
status: beta
parent_family: x/observability
suggested_gate_profile: single_module_behavior
owner: observability
risk: low
summary: Test-only mock collector for asserting metric emissions in unit and integration tests.

responsibilities:
  - In-memory mock implementation of metrics.AggregateCollector
  - Recorded metric assertions (Count, LastValue, etc.)

non_goals:
  - Production metric collection
  - Export or scrape functionality

allowed_imports:
  - stdlib
  - metrics

forbidden_imports:
  - core/**
  - router/**
  - contract/**
  - middleware/**
  - security/**
  - store/**
  - health/**
  - log/**
  - x/ai/**
  - x/data/**
  - x/fileapi/**
  - x/frontend/**
  - x/gateway/**
  - x/messaging/**
  - x/openapi/**
  - x/resilience/**
  - x/rest/**
  - x/rpc/**
  - x/tenant/**
  - x/validate/**

test_commands:
  - go test -race -timeout 60s ./x/observability/testmetrics/...
  - go vet ./x/observability/testmetrics/...

review_checklist:
  - Keep this strictly a test double with no production wiring
  - Preserve metrics collector compatibility

agent_hints:
  - Use in tests to assert emitted metrics
  - Do not wire this into production collectors
