name: x/observability/testmetrics
path: x/observability/testmetrics
layer: extension
status: beta
parent_family: x/observability
suggested_gate_profile: single_module_behavior
owner: observability
risk: low
summary: Test-only mock collector for asserting metric emissions in unit and integration tests.

responsibilities:
  - In-memory mock implementation of metrics.AggregateCollector
  - Recorded metric assertions (Count, LastValue, etc.)

non_goals:
  - Production metric collection
  - Export or scrape functionality

allowed_imports:
  - stdlib
  - metrics

test_commands:
  - go test -race -timeout 60s ./x/observability/testmetrics/...
  - go vet ./x/observability/testmetrics/...

forbidden_imports:
  - x/tenant/**
  - x/ai/**
  - x/gateway/**

review_checklist:
  - Use only in test code; do not import in production packages
  - Keep captured metric records queryable by name and tag
  - Do not add export or scrape functionality

agent_hints:
  - Use testmetrics.Collector as the AggregateCollector in handler and service tests
  - Prefer assertions on specific metric names over full record snapshots
