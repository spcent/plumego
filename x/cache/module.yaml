name: x/cache
path: x/cache
layer: extension
status: experimental
owner: platform
summary: Subordinate extension-layer cache adapters and topology-heavy cache implementations within the x/data family.

parent_family: x/data

responsibilities:
  - Distributed cache with consistent hashing, replication, and failover
  - Redis client adapter implementing store/cache.Cache

non_goals:
  - Core cache interface definitions (those live in store/cache)
  - Tenant-aware cache adapters (those live in x/tenant/store/cache)
  - In-memory cache implementations (those live in store/cache)

public_entrypoints:
  - distributed
  - redis

allowed_imports:
  - stdlib
  - store/cache
  - contract
  - log
  - metrics

forbidden_imports:
  - core/**
  - middleware/**
  - x/tenant/**
  - x/ai/**
  - reference/**
  - cmd/**

test_commands:
  - go test -race -timeout 60s ./x/cache/...
  - go test -timeout 20s ./x/cache/...
  - go vet ./x/cache/...

doc_paths:
  - docs/modules/x-cache/README.md

change_risks:
  - distributed cache correctness regression
  - hash ring consistency regression
  - redis adapter contract regression

review_checklist:
  - Keep distributed and redis implementations behind store/cache.Cache interface
  - Do not add tenant-specific logic here
  - Do not add topology decisions to stable store

agent_hints:
  - Treat x/cache as a subordinate of x/data; start distributed cache work in x/data before opening this package directly
  - Prefer store/cache.MemoryCache for in-process caching; open x/cache only for distributed or Redis topology
  - For tenant-aware caching use x/tenant/store/cache
