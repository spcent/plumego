name: x/discovery
path: x/discovery
layer: extension
status: experimental
owner: edge
risk: medium
summary: Subordinate service discovery primitives and adapters within the x/gateway family.

parent_family: x/gateway

responsibilities:
  - Service instance discovery
  - Resolver helpers
  - Discovery adapters

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Tenant policy orchestration

allowed_imports:
  - contract
  - log
  - metrics

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/discovery/...
  - go test -timeout 20s ./x/discovery/...
  - go vet ./x/discovery/...

doc_paths:
  - docs/modules/x-discovery/README.md

review_checklist:
  - Keep discovery behavior explicit
  - Avoid hidden background state
  - Preserve deterministic resolution paths

agent_hints:
  - Treat x/discovery as a subordinate of x/gateway; start service discovery work in x/gateway before opening this package directly
  - Keep transport concerns out of discovery
  - Do not require core knowledge
