name: x/rest
path: x/rest
layer: extension
status: experimental
summary: Legacy REST resource helpers; new transport-facing work should follow reference-app patterns instead of growing this root.

responsibilities:
  - REST resource helpers
  - CRUD route scaffolding
  - Explicit resource transport adapters

non_goals:
  - Core bootstrap ownership
  - Stable root entrypoints
  - Business repository ownership

allowed_imports:
  - contract
  - log
  - router
  - store

forbidden_imports:
  - core/components/**
  - x/tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./x/rest/...
  - go test -timeout 20s ./x/rest/...
  - go vet ./x/rest/...

review_checklist:
  - Keep resource wiring explicit
  - Avoid hidden repository injection
  - Preserve transport-only helpers

agent_hints:
  - Do not start new application structure from x/rest
  - Keep resource ownership local with explicit route binding
  - Do not require core knowledge
