name: x/resilience
status: experimental
owner: runtime
risk: medium

responsibilities:
  - Circuit breaker implementation
  - Rate limiter implementation
  - Reusable fault-tolerance primitives

does_not_own:
  - Middleware composition (owned by middleware)
  - Business logic (caller responsibility)

public_entrypoints:
  - CircuitBreaker
  - RateLimiter
  - New

validation_commands:
  - go test -timeout 20s ./x/resilience/...
  - go vet ./x/resilience/...

deprecations: []

notes: >
  Reusable extension-layer circuit breaker and rate-limit primitives.
  Can be used in middleware or handlers.
