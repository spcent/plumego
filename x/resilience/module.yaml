name: x/resilience
path: x/resilience
layer: extension
status: experimental
suggested_gate_profile: single_module_behavior
owner: runtime
risk: medium
summary: Reusable resilience primitives and adapters that do not belong to stable security or a single feature family.

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/x/resilience/README.md

responsibilities:
  - Circuit breaker primitives
  - Rate limiter primitives
  - Reusable resilience middleware adapters

non_goals:
  - Stable root entrypoints
  - App bootstrap ownership
  - Feature-specific retry or provider orchestration
  - Security policy ownership

public_entrypoints:
  - circuitbreaker
  - ratelimit

allowed_imports:
  - contract
  - middleware

forbidden_imports:
  - core/**
  - security/**
  - store/**
  - x/tenant/**

test_commands:
  - go test -race -timeout 60s ./x/resilience/...
  - go test -timeout 20s ./x/resilience/...
  - go vet ./x/resilience/...

doc_paths:
  - docs/modules/x/resilience/README.md
  - docs/architecture/x-ai-resilience-boundary.md

change_risks:
  - breaker threshold regression
  - adapter behavior regression
  - failure-path regression

stop_conditions:
  - The change introduces app bootstrap ownership, security policy ownership, or feature-specific workflow orchestration into x/resilience
  - The change hides circuit breaker state or adapter behavior behind globals or implicit registration
  - The change requires stable security or middleware to absorb reusable resilience ownership
  - The change turns x/resilience into a catch-all runtime policy package

review_checklist:
  - Keep resilience components reusable across extension families
  - Avoid hidden globals
  - Keep transport adapters explicit
  - Keep circuit-breaker state and thresholds reviewable
  - Keep feature-specific resilience orchestration, including AI provider fallback, in owning extensions

agent_hints:
  - Put reusable circuit breaking and rate limiting here instead of in stable security or feature-specific packages
  - Keep feature-specific resilience orchestration in the owning extension package
  - Keep adapters explicit rather than wrapping failures behind hidden middleware magic

task_affinity:
  resilience: x/resilience/
  bugfix_triage: x/resilience/

landing_zones:
  circuit_breaker: circuitbreaker/
  rate_limit: ratelimit/

docs_sync_contract:
  on_status_change:
    - docs/EXTENSION_MATURITY.md
    - docs/ROADMAP.md
    - specs/extension-maturity.yaml
  on_api_change:
    - docs/modules/x/resilience/README.md
    - website/src/content/docs/docs/modules/x-resilience.mdx
    - website/src/content/docs/zh/docs/modules/x-resilience.mdx
  on_behavior_change:
    - docs/modules/x/resilience/README.md
