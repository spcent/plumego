name: x/validate
status: experimental
owner: api
risk: medium

responsibilities:
  - Request binding helpers
  - Explicit validation patterns
  - Error message translation

does_not_own:
  - Validation rules (caller responsibility)
  - Response formatting (owned by contract)
  - Middleware composition (owned by middleware)

public_entrypoints:
  - Bind
  - BindJSON
  - Validator interface

validation_commands:
  - go test -timeout 20s ./x/validate/...
  - go vet ./x/validate/...

deprecations: []

notes: >
  Validation bridge for explicit Bind/BindJSON call sites.
  No third-party tag parser or adapter system.
