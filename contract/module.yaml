name: contract
path: contract
layer: stable
status: ga
suggested_gate_profile: stable_root_change
owner: transport
risk: high
summary: Request and response contracts, error model, and context helpers.

strict_boundary: transport_contracts

entrypoint_reads:
  - AGENTS.md
  - docs/reference/canonical-style-guide.md
  - docs/concepts/agent-first-repo-blueprint.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - contract/errors.go
  - contract/response.go
  - contract/context_core.go

responsibilities:
  - Structured error model
  - Response helpers
  - Request context helpers
  - Trace and request metadata carriers

non_goals:
  - Route matching
  - App bootstrap
  - Persistence logic and multipart upload convenience helpers
  - Protocol gateway families and business rules
  - Session or token issuance and auth identity primitives
  - Middleware observability policy, field redaction, request-id generation policy, or repo-wide error utility helpers
  - Framework-style request bags, validation framework ownership, abort state, or request-local service-locator helpers

public_entrypoints:
  - HeaderContentType
  - ContentTypeJSON
  - NewErrorBuilder
  - ErrorBuilder
  - ErrorCategory
  - ErrorType
  - ErrorTypeMeta
  - ErrorType.Meta
  - APIError
  - APIError.Status
  - APIError.Code
  - APIError.Message
  - APIError.Category
  - APIError.Type
  - APIError.RequestID
  - APIError.Details
  - APIError.Error
  - Code* transport error constants
  - WriteError
  - WriteResponse
  - RequestContext
  - WithRequestContext
  - RequestContextFromContext
  - RequestParamFromContext
  - WithRequestID
  - RequestIDFromContext
  - RequestIDHeader
  - WithTraceContext
  - TraceContextFromContext
  - TraceContext
  - TraceContext.IsSampled
  - TraceContext.HasTraceID
  - TraceContext.HasSpanID
  - TraceContext.Valid
  - AsAPIError
  - GetRouteState
  - PutRouteState
  - ErrHandlerNil
  - ErrResponseWriterNil
  - ErrInvalidResponseStatus

public_surface_stability:
  stable_v1:
    - NewErrorBuilder
    - ErrorBuilder
    - ErrorCategory
    - ErrorType
    - ErrorTypeMeta
    - ErrorType.Meta
    - APIError
    - APIError.Status
    - APIError.Code
    - APIError.Message
    - APIError.Category
    - APIError.Type
    - APIError.RequestID
    - APIError.Details
    - APIError.Error
    - Code* transport error constants
    - WriteError
    - WriteResponse
    - WithRequestID
    - RequestIDFromContext
    - RequestContext
    - WithRequestContext
    - RequestContextFromContext
    - RequestParamFromContext
    - WithTraceContext
    - TraceContextFromContext
    - TraceContext
    - TraceContext.IsSampled
    - TraceContext.HasTraceID
    - TraceContext.HasSpanID
    - TraceContext.Valid
    - AsAPIError
    - GetRouteState
    - PutRouteState
  guardrail_constants:
    - HeaderContentType
    - ContentTypeJSON
    - RequestIDHeader
    - ErrHandlerNil
    - ErrResponseWriterNil
    - ErrInvalidResponseStatus
  future_breaking_only:
    - Removing TraceContext as the lightweight context carrier
  residual_v1_tradeoffs:
    - APIError remains exported as an opaque error value because WriteError accepts it directly; callers construct values through NewErrorBuilder and inspect them through read-only methods.

error_taxonomy:
  categories:
    - client_error: generic client input and resource-state failures
    - validation_error: request validation and parse input failures
    - auth_error: authentication and authorization failures
    - rate_limit_error: throttling failures
    - timeout_error: request timeout and upstream gateway timeout failures
    - server_error: infrastructure, programming, and upstream server failures
  extension_code_rules:
    - Extension-owned codes may refine a canonical ErrorType but must stay in the same status and category family.
    - Extension-owned codes must use stable uppercase machine names and must not add business categories to contract.
    - Use ErrorType.Meta for canonical status/category/code defaults instead of duplicating taxonomy switches.

allowed_imports:
  - stdlib

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./contract/...
  - go test -timeout 20s ./contract/...
  - go vet ./contract/...

doc_paths:
  - docs/modules/contract/README.md

change_risks:
  - error shape regression
  - response write regression
  - request context regression

stop_conditions:
  - The change introduces protocol gateways, session lifecycle management, or tracing infrastructure into contract
  - The change requires contract to learn app bootstrap, route matching, persistence, or feature policy details
  - The change adds mutable request bags, abort state, or service-locator behavior to request context helpers
  - The change expands RequestContext or TraceContext baggage instead of keeping them as transport metadata carriers
  - The change creates new per-feature response envelopes or ad hoc error constructor families

review_checklist:
  - Keep one error write path
  - Keep transport helpers explicit
  - Keep protocol-specific wiring out of contract
  - Avoid leaking internals in responses
  - Do not turn request context helpers into a mutable request bag or runtime state container

agent_hints:
  - Prefer stdlib-shaped helpers and keep response writing on the canonical WriteError and WriteResponse paths
  - Do not introduce app wiring, persistence shortcuts, feature-specific protocol helpers, or tracing infrastructure here
  - Keep context helpers limited to transport metadata; RequestContext is router metadata only and TraceContext baggage is copied carrier data only

task_affinity:
  symbol_change: contract/
  http_endpoint: contract/
  bugfix_triage: contract/

landing_zones:
  error_codes: error_codes.go
  response_write: response.go
  context_accessors: context_core.go
  request_id: request_id.go
  trace: trace.go

docs_sync_contract:
  on_api_change:
    - docs/evidence/stable-api/snapshots/contract-head.snapshot
    - docs/modules/contract/README.md
  on_behavior_change:
    - docs/modules/contract/README.md
