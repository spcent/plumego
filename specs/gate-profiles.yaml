version: 1

# Machine-readable gate profiles. Used by `plumego agents validate-diff`
# and `make validate-diff` to select the minimal sufficient validation
# profile for the current git diff without manual inference.
#
# {module} in commands is substituted with the actual module path.

profiles:
  docs_only:
    description: Documentation-only change — no Go files modified
    go_gates_required: false
    commands: []
    notes: Check accuracy, links, and authority order only.

  single_module_behavior:
    description: Single extension module or low-risk stable root change
    commands:
      - "go test -race -timeout 60s ./{module}/..."
      - "go test -timeout 20s ./{module}/..."
      - "go vet ./{module}/..."

  router_middleware_security:
    description: Change to router, middleware, or security stable roots
    commands:
      - "go test -race -timeout 60s ./{module}/..."
      - "go test -timeout 20s ./{module}/..."
      - "go vet ./{module}/..."
      - "go run ./internal/checks/dependency-rules"
    extra_focus:
      router:
        - static_route_tests
        - param_route_tests
        - group_route_tests
        - reverse_route_tests
      middleware:
        - ordering_tests
        - error_path_tests
        - panic_tests
        - timeout_tests
        - cancel_tests
      security:
        - invalid_token_tests
        - fail_closed_tests
        - timing_safe_comparison_tests

  stable_root_change:
    description: Change to core, contract, store, health, log, or metrics
    commands:
      - "go test -race -timeout 60s ./{module}/..."
      - "go test -timeout 20s ./{module}/..."
      - "go vet ./{module}/..."
      - "go run ./internal/checks/dependency-rules"
      - "go run ./internal/checks/agent-workflow"
      - "go run ./internal/checks/module-manifests"

  cross_module_public_api_release:
    description: Cross-module change, public API change, or release-relevant change
    commands:
      - "go run ./internal/checks/dependency-rules"
      - "go run ./internal/checks/agent-workflow"
      - "go run ./internal/checks/module-manifests"
      - "go run ./internal/checks/reference-layout"
      - "go run ./internal/checks/extension-maturity"
      - "go run ./internal/checks/extension-beta-evidence"
      - "go run ./internal/checks/deprecation-inventory -strict"
      - "go test -race -timeout 60s ./..."
      - "go test -timeout 20s ./..."
      - "go vet ./..."

# How to select a profile automatically (used by validate-diff):
selection_rules:
  - id: docs_only
    description: All changed files match doc/spec/task patterns and no .go files changed
    path_patterns: ["docs/**", "*.md", "specs/**", "tasks/**", "website/**"]
    exclude_go_changes: true
    use: docs_only

  - id: rms_stable
    description: Changed module is router, middleware, or security
    modules: [router, middleware, security]
    use: router_middleware_security

  - id: other_stable
    description: Changed module is another stable root
    modules: [core, contract, store, health, log, metrics]
    use: stable_root_change

  - id: cross_module
    description: Changed paths span multiple distinct modules or touch public API
    use: cross_module_public_api_release

  - id: default
    description: Extension module or unrecognized module
    use: single_module_behavior
