version: 1

context_policy:
  initial_package: startup
  task_default_package: implementation
  startup:
    - AGENTS.md
    - specs/task-routing.yaml
  package_docs:
    - docs/AGENT_CONTEXT_BUDGET.md
  selection_order:
    - Read AGENTS.md.
    - Match the request to one tasks entry.
    - Read only that entry's start_with files.
    - Read the target module.yaml before editing module behavior.
    - Add extra docs or specs only when preflight identifies a concrete reason.
  split_before_implementation_when:
    - more_than_one_primary_module
    - more_than_five_files
    - more_than_three_validation_commands
    - unclear_public_api_dependency_security_or_boundary_impact
  validation_output:
    format: compact_command_status_summary
    include:
      - command
      - status
      - first_meaningful_failure
      - next_step

routing_rules:
  stable_root_work:
    intent: Change kernel, lifecycle, route structure, transport contracts, transport middleware, auth primitives, or storage primitives.
    destination: stable
    packages:
      - core
      - router
      - contract
      - middleware
      - security
      - store
      - health
      - log
      - metrics

  extension_work:
    intent: Change product capability, business feature, protocol adaptation, or extension behavior.
    destination: extension
    beta_families:
      - x/gateway
      - x/observability
      - x/rest
      - x/websocket
      - x/tenant
      - x/frontend
      - x/messaging
    primary_families:
      - x/tenant
      - x/fileapi
      - x/messaging
      - x/gateway
      - x/rest
      - x/websocket
      - x/frontend
      - x/observability
      - x/openapi
      - x/resilience
      - x/rpc
      - x/data
      - x/ai
      - x/validate

  app_wiring:
    intent: Change application wiring, bootstrap shape, dependency injection, or route registration.
    destination: reference
    paths:
      - reference/standard-service
      - cmd/plumego/internal/scaffold

  repo_rules:
    intent: Change architecture rules, boundary definitions, quality gates, or machine-readable specs.
    destination: specs

  task_queue:
    intent: Change execution plan, work items, or task sequencing.
    destination: tasks/cards

tasks:
  control_plane:
    intent: Change AGENTS, canonical style, architecture blueprint, repo specs, dependency rules, or control-plane guidance.
    context_package: control-plane
    start_with:
      - AGENTS.md
      - docs/AGENT_CONTEXT_BUDGET.md
      - docs/CANONICAL_STYLE_GUIDE.md
      - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
      - specs/repo.yaml
      - specs/task-routing.yaml
      - specs/dependency-rules.yaml
      - specs/stop-condition-handlers.yaml
      - specs/request-flows.yaml
    avoid:
      - reference/with-messaging
      - reference/with-gateway

  agent_context_budget:
    intent: Change agent token budget, context loading, task-card limits, validation-output compression, or resume discipline.
    context_package: control-plane
    start_with:
      - AGENTS.md
      - docs/AGENT_CONTEXT_BUDGET.md
      - docs/CODEX_WORKFLOW.md
      - docs/AGENT_CODE_QUALITY_RULES.md
      - specs/task-routing.yaml
      - specs/agent-quality-rules.yaml
      - specs/checks.yaml
      - specs/repo.yaml
    avoid:
      - reference/with-messaging
      - reference/with-gateway
      - docs/stable-api/snapshots

  module_manifest:
    intent: Change module ownership, scope, test commands, or review guidance in module manifests.
    start_with:
      - AGENTS.md
      - specs/module-manifest.schema.yaml
      - specs/dependency-rules.yaml
      - core/module.yaml
    avoid:
      - reference/with-messaging
      - tasks/cards

  symbol_change:
    intent: Remove, rename, or change the behavior of an exported symbol.
    context_package: implementation
    start_with:
      - AGENTS.md
      - docs/CANONICAL_STYLE_GUIDE.md
      - docs/AGENT_CODE_QUALITY_RULES.md
      - specs/change-recipes/symbol-change.yaml
      - specs/package-hotspots.yaml
    avoid:
      - reference/with-messaging
      - reference/with-gateway

  bugfix_triage:
    intent: Localize an implementation bug and identify the owning module before coding.
    context_package: startup
    start_with:
      - AGENTS.md
      - specs/task-routing.yaml
      - specs/change-recipes/fix-bug.yaml
      - specs/package-hotspots.yaml
    avoid:
      - reference/with-messaging
      - reference/with-gateway

  http_endpoint_bugfix:
    intent: Fix a defect in HTTP route wiring, handler transport logic, or contract-backed endpoint behavior.
    context_package: implementation
    start_with:
      - AGENTS.md
      - docs/CANONICAL_STYLE_GUIDE.md
      - specs/change-recipes/http-endpoint-bugfix.yaml
      - reference/standard-service/internal/app/routes.go
      - contract/module.yaml
      - router/module.yaml
    avoid:
      - middleware
      - x/gateway

  tenant_policy_change:
    intent: Change tenant resolution, tenant policy, quota, rate limiting, or tenant-session behavior.
    context_package: implementation
    start_with:
      - AGENTS.md
      - specs/change-recipes/tenant-policy-change.yaml
      - x/tenant/module.yaml
      - docs/architecture/X_TENANT_BLUEPRINT.md
      - docs/modules/x/tenant/README.md
    avoid:
      - middleware
      - store
      - core

  stable_root_boundary_review:
    intent: Review stable-root changes for boundary drift, hidden coupling, and compatibility risk without coding.
    context_package: review
    start_with:
      - AGENTS.md
      - specs/change-recipes/stable-root-boundary-review.yaml
      - specs/repo.yaml
      - specs/dependency-rules.yaml
      - core/module.yaml
      - router/module.yaml
      - contract/module.yaml
      - middleware/module.yaml
      - security/module.yaml
      - store/module.yaml
      - health/module.yaml
      - log/module.yaml
      - metrics/module.yaml
    avoid:
      - reference/with-messaging
      - reference/with-gateway

  package_hotspots:
    start_with:
      - specs/package-hotspots.yaml
      - specs/task-routing.yaml

  file_api:
    intent: Change HTTP file upload, download, or storage transport over x/fileapi.
    start_with:
      - x/fileapi/module.yaml
      - docs/modules/x/fileapi/README.md
      - x/fileapi/handler.go
    avoid:
      - store/file
      - x/data/file

  app_bootstrap:
    intent: Change application bootstrap shape, main.go wiring, or core server construction.
    start_with:
      - docs/CANONICAL_STYLE_GUIDE.md
      - specs/repo.yaml
      - reference/standard-service/main.go
      - reference/standard-service/internal/app/app.go
      - reference/standard-service/internal/app/routes.go
    avoid:
      - x/rest
      - x/gateway
      - x/messaging/webhook

  http_endpoint:
    intent: Add or change an HTTP route, handler, or route-group registration.
    start_with:
      - docs/CANONICAL_STYLE_GUIDE.md
      - reference/standard-service/internal/app/routes.go
      - contract/module.yaml
      - router/module.yaml
    avoid:
      - middleware

  middleware:
    intent: Add, change, or fix a stable transport middleware (accesslog, bodylimit, cors, recovery, requestid, security, timeout, tracing, httpmetrics).
    start_with:
      - middleware/module.yaml
      - docs/modules/middleware/README.md
      - docs/CANONICAL_STYLE_GUIDE.md
    avoid:
      - core
      - contract

  security:
    intent: Change authentication primitives, JWT handling, abuse guards, security headers, or input validation in the stable security package.
    start_with:
      - security/module.yaml
      - docs/modules/security/README.md
      - AGENTS.md
    avoid:
      - middleware
      - x/tenant

  store:
    intent: Change stable storage primitives — DB helpers, in-memory cache, file storage, KV, or idempotency contracts.
    start_with:
      - store/module.yaml
      - docs/modules/store/README.md
      - specs/repo.yaml
    avoid:
      - x/tenant
      - x/data

  gateway_edge_transport:
    intent: Change reverse proxy, load balancing, rewrite, cache, or edge transport behavior in x/gateway.
    start_with:
      - x/gateway/module.yaml
      - x/gateway/entrypoints.go
      - specs/extension-taxonomy.yaml
    avoid:
      - x/rest
      - reference/standard-service

  resource_api_standardization:
    intent: Change REST resource controllers, CRUD route conventions, or resource interface contracts in x/rest.
    start_with:
      - x/rest/module.yaml
      - docs/modules/x/rest/README.md
      - x/rest/spec.go
      - x/rest/entrypoints.go
    avoid:
      - core
      - x/gateway

  rpc_transport:
    intent: Change gRPC server, client pool, or HTTP-to-gRPC transcoding behavior in x/rpc.
    start_with:
      - x/rpc/module.yaml
      - x/rpc/server/module.yaml
      - specs/extension-taxonomy.yaml
    avoid:
      - core
      - middleware

  messaging:
    intent: Change app-facing messaging service, delivery orchestration, or provider abstraction in x/messaging.
    start_with:
      - x/messaging/module.yaml
      - x/messaging/entrypoints.go
      - specs/extension-taxonomy.yaml
    avoid:
      - x/messaging/mq
      - x/messaging/pubsub
      - x/messaging/webhook

  tenant:
    intent: Change tenant resolution, policy enforcement, quota, rate limiting, or tenant session behavior in x/tenant.
    start_with:
      - x/tenant/module.yaml
      - docs/modules/x/tenant/README.md
      - docs/architecture/X_TENANT_BLUEPRINT.md
    avoid:
      - middleware
      - store
      - core

  websocket:
    intent: Change WebSocket hub lifecycle, room management, broadcast, or connection handling in x/websocket.
    start_with:
      - x/websocket/module.yaml
      - docs/modules/x/websocket/README.md
      - x/websocket/websocket.go
    avoid:
      - core
      - router

  frontend_asset_serving:
    intent: Static asset policy, embedded frontend mounting, SPA fallback, cache/header policy, precompressed assets, and frontend MIME overrides.
    start_with:
      - x/frontend/module.yaml
      - docs/modules/x/frontend/README.md
      - reference/standard-service
    avoid:
      - core
      - router

  devtools_local_debug:
    intent: Change local-only debug endpoints, inspector surfaces, or development tooling in x/observability/devtools.
    start_with:
      - x/observability/devtools/module.yaml
      - x/observability/devtools/devtools.go
      - README.md
    avoid:
      - core
      - reference/standard-service

  service_discovery:
    intent: Change service instance discovery, resolver helpers, or discovery backends in x/gateway/discovery.
    start_with:
      - x/gateway/discovery/module.yaml
      - specs/extension-taxonomy.yaml
      - specs/repo.yaml
    avoid:
      - core
      - store

  ops_admin_surface:
    intent: Change protected admin routes, runtime diagnostics, or health orchestration surfaces in x/observability/ops.
    start_with:
      - x/observability/ops/module.yaml
      - x/observability/module.yaml
      - specs/extension-taxonomy.yaml
    avoid:
      - health
      - core

  observability_admin:
    intent: Change exporter wiring, tracer configuration, metric collector adapters, or Prometheus/OpenTelemetry integration in x/observability.
    start_with:
      - x/observability/module.yaml
      - x/observability/ops/module.yaml
    avoid:
      - core
      - health

  resilience:
    intent: Change circuit breaker, rate-limit primitives, or cross-family resilience patterns in x/resilience.
    start_with:
      - x/resilience/module.yaml
      - specs/extension-taxonomy.yaml
    avoid:
      - security
      - core

  ai:
    intent: Change AI provider adapters, session management, streaming, tool invocation, or LLM orchestration in x/ai.
    start_with:
      - x/ai/module.yaml
      - docs/modules/x/ai/README.md
    avoid:
      - core
      - x/resilience

  acceptance_test:
    intent: Write pre-failing acceptance test functions that define a task card's done condition before implementation begins.
    start_with:
      - specs/change-recipes/add-acceptance-tests.yaml
      - tasks/cards/TEMPLATE.md
      - AGENTS.md
    avoid:
      - reference/with-messaging
      - reference/with-gateway

  scaffold:
    intent: Change the plumego CLI scaffold templates, generated project layout, or new-project command behavior.
    start_with:
      - cmd/plumego/commands/new.go
      - cmd/plumego/internal/scaffold/scaffold.go
      - reference/standard-service
    avoid:
      - reference/with-messaging
      - reference/with-gateway
      - reference/with-websocket
      - reference/with-webhook
