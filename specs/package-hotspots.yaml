version: 1

metadata:
  purpose: Package-level hotspot index for tasks where module-level guidance is not specific enough.
  scope:
    - Only ambiguity hotspots
    - Not a replacement for module manifests
    - Not a full package catalog
  read_after:
    - docs/CANONICAL_STYLE_GUIDE.md
    - specs/repo.yaml
    - specs/task-routing.yaml
  rules:
    - Add entries only for packages where the wrong package choice causes notable rework.
    - Keep start_with and avoid paths concrete and bounded.
    - Prefer package-level role labels over long prose.
    - Constructor-pattern work must start with docs/CANONICAL_STYLE_GUIDE.md and the owning module manifest; do not make repo-wide constructor changes from this index.

role_definitions:
  app_surface: App-facing transport or capability entrypoint.
  implementation: Concrete implementation package behind an app-facing or stable contract.
  primitive: Stable or reusable low-level building block with narrow responsibility.
  policy: Package focused on validation, policy, or decision logic.
  adapter: Package that adapts one layer to another without owning bootstrap.

packages:
  x/fileapi:
    module: x/fileapi
    layer: extension
    role: app_surface
    task_families:
      - file_api
    start_with:
      - x/fileapi/module.yaml
      - x/fileapi/handler.go
      - docs/modules/x-fileapi/README.md
    avoid:
      - x/data/file
      - store/file
    summary: App-facing file upload, download, metadata, and temporary URL transport.

  x/data/file:
    module: x/data
    layer: extension
    role: implementation
    task_families:
      - file_api
      - tenant
      - store
    start_with:
      - x/data/file/module.yaml
      - x/data/file/local.go
      - x/data/file/metadata.go
    avoid:
      - x/fileapi
      - store/file
    summary: Tenant-aware file storage and metadata implementations.

  x/rest:
    module: x/rest
    layer: extension
    role: app_surface
    task_families:
      - resource_api_standardization
    start_with:
      - x/rest/module.yaml
      - x/rest/spec.go
      - x/rest/entrypoints.go
    avoid:
      - reference/standard-service
      - x/gateway
    summary: Reusable resource-interface layer for CRUD-standardized APIs.

  x/gateway:
    module: x/gateway
    layer: extension
    role: app_surface
    task_families:
      - gateway_edge_transport
    start_with:
      - x/gateway/module.yaml
      - x/gateway/entrypoints.go
      - x/gateway/proxy.go
    avoid:
      - x/rest
      - reference/standard-service
    summary: App-facing gateway and edge transport entrypoint.

  x/tenant/core:
    module: x/tenant
    layer: extension
    role: policy
    task_families:
      - tenant
    start_with:
      - x/tenant/core/middleware.go
      - x/tenant/core/policy.go
      - x/tenant/core/quota.go
    avoid:
      - middleware
      - store
      - core
    summary: Tenant resolution, validation, quota, policy, and rate-limit core logic.

  x/tenant/store/db:
    module: x/tenant
    layer: extension
    role: adapter
    task_families:
      - tenant
      - store
    start_with:
      - x/tenant/store/db/doc.go
      - x/tenant/store/db/tenant_db.go
    avoid:
      - store/db
      - core
    summary: Tenant-aware SQL adapter layer for automatic query scoping.

  middleware/httpmetrics:
    module: middleware
    layer: stable
    role: primitive
    task_families:
      - middleware
      - observability_admin
    start_with:
      - middleware/httpmetrics/http_metrics.go
      - middleware/module.yaml
    avoid:
      - x/observability
      - core
    summary: Stable transport-level HTTP metrics middleware primitive.

  middleware/requestid:
    module: middleware
    layer: stable
    role: primitive
    task_families:
      - middleware
      - http_endpoint
    start_with:
      - middleware/requestid/request_id.go
      - middleware/module.yaml
    avoid:
      - core
      - x/observability
    summary: Stable request and trace ID propagation middleware primitive.

  contract:
    module: contract
    layer: stable
    role: primitive
    task_families:
      - http_endpoint
      - security
    start_with:
      - contract/module.yaml
      - contract/response.go
      - contract/errors.go
    avoid:
      - x/rest
      - x/gateway
      - core
    summary: Stable transport contracts for responses, errors, and request metadata.
