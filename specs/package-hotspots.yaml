version: 1

metadata:
  purpose: Package-level hotspot index for tasks where module-level guidance is not specific enough.
  scope:
    - Only ambiguity hotspots
    - Not a replacement for module manifests
    - Not a full package catalog
  read_after:
    - docs/CANONICAL_STYLE_GUIDE.md
    - specs/repo.yaml
    - specs/task-routing.yaml
  rules:
    - Add entries only for packages where the wrong package choice causes notable rework.
    - Keep start_with and avoid paths concrete and bounded.
    - Prefer package-level role labels over long prose.
    - Constructor-pattern work must start with docs/CANONICAL_STYLE_GUIDE.md and the owning module manifest; do not make repo-wide constructor changes from this index.

role_definitions:
  app_surface: App-facing transport or capability entrypoint.
  implementation: Concrete implementation package behind an app-facing or stable contract.
  primitive: Stable or reusable low-level building block with narrow responsibility.
  policy: Package focused on validation, policy, or decision logic.
  adapter: Package that adapts one layer to another without owning bootstrap.

packages:
  x/fileapi:
    module: x/fileapi
    layer: extension
    role: app_surface
    task_families:
      - file_api
    start_with:
      - x/fileapi/module.yaml
      - x/fileapi/handler.go
      - docs/modules/x/fileapi/README.md
    avoid:
      - x/data/file
      - store/file
    summary: App-facing file upload, download, metadata, and temporary URL transport.

  x/data/file:
    module: x/data
    layer: extension
    role: implementation
    task_families:
      - file_api
      - tenant
      - store
    start_with:
      - x/data/file/module.yaml
      - x/data/file/local.go
      - x/data/file/metadata.go
    avoid:
      - x/fileapi
      - store/file
    summary: Tenant-aware file storage and metadata implementations.

  x/rest:
    module: x/rest
    layer: extension
    role: app_surface
    task_families:
      - resource_api_standardization
    start_with:
      - x/rest/module.yaml
      - x/rest/spec.go
      - x/rest/entrypoints.go
    avoid:
      - reference/standard-service
      - x/gateway
    summary: Reusable resource-interface layer for CRUD-standardized APIs.

  x/rpc:
    module: x/rpc
    layer: extension
    role: app_surface
    task_families:
      - rpc_transport
    start_with:
      - x/rpc/module.yaml
      - x/rpc/server/module.yaml
    avoid:
      - core
      - middleware
      - reference/standard-service
    summary: Dependency-free RPC transport contracts and lifecycle helpers; keep concrete transports outside core and extension packages.

  x/rpc/client:
    module: x/rpc
    layer: extension
    role: primitive
    task_families:
      - rpc_transport
    start_with:
      - x/rpc/module.yaml
      - x/rpc/client/module.yaml
      - x/rpc/client/pool.go
    avoid:
      - core
      - middleware
      - x/gateway
    summary: Transport-neutral client connection pool and unary interceptors with caller-selected retry policy.

  x/rpc/server:
    module: x/rpc
    layer: extension
    role: primitive
    task_families:
      - rpc_transport
    start_with:
      - x/rpc/module.yaml
      - x/rpc/server/module.yaml
      - x/rpc/server/server.go
    avoid:
      - core
      - middleware
      - x/gateway
    summary: RPC server lifecycle primitive with explicit service registration and context-aware shutdown.

  x/rpc/gateway:
    module: x/rpc
    layer: extension
    role: adapter
    task_families:
      - rpc_transport
    start_with:
      - x/rpc/module.yaml
      - x/rpc/gateway/module.yaml
      - x/rpc/gateway/transcoder.go
    avoid:
      - core
      - router
      - x/gateway
    summary: HTTP route adapter for caller-owned RPC handlers; not the edge gateway family.

  x/gateway:
    module: x/gateway
    layer: extension
    role: app_surface
    task_families:
      - gateway_edge_transport
    start_with:
      - x/gateway/module.yaml
      - x/gateway/entrypoints.go
      - x/gateway/proxy.go
    avoid:
      - x/rest
      - reference/standard-service
    summary: App-facing gateway and edge transport entrypoint.

  x/gateway/discovery:
    module: x/gateway
    layer: extension
    role: primitive
    task_families:
      - gateway_edge_transport
    start_with:
      - x/gateway/module.yaml
      - x/gateway/discovery/module.yaml
      - x/gateway/discovery/discovery.go
    avoid:
      - core
      - x/messaging
    summary: Service discovery primitive under the gateway family; start from x/gateway unless the task is only backend discovery mechanics.

  x/gateway/ipc:
    module: x/gateway
    layer: extension
    role: primitive
    task_families:
      - gateway_edge_transport
    start_with:
      - x/gateway/module.yaml
      - x/gateway/ipc/module.yaml
      - x/gateway/ipc/ipc.go
    avoid:
      - x/messaging
      - core
    summary: Narrow IPC transport primitive under the gateway family, not a general workflow or eventing entrypoint.

  x/messaging:
    module: x/messaging
    layer: extension
    role: app_surface
    task_families:
      - messaging
    start_with:
      - x/messaging/module.yaml
      - x/messaging/entrypoints.go
      - x/messaging/service.go
    avoid:
      - x/messaging/mq
      - x/messaging/pubsub
      - x/messaging/scheduler
      - x/messaging/webhook
    summary: Canonical app-facing messaging family entrypoint for send, delivery, scheduling, queue, pubsub, and webhook orchestration.

  x/messaging/mq:
    module: x/messaging
    layer: extension
    role: primitive
    task_families:
      - messaging
    start_with:
      - x/messaging/module.yaml
      - x/messaging/mq/module.yaml
      - x/messaging/mq/queue.go
    avoid:
      - reference/standard-service
      - core
    summary: Durable queue primitive under x/messaging; do not start here for app-facing messaging flows.

  x/messaging/pubsub:
    module: x/messaging
    layer: extension
    role: primitive
    task_families:
      - messaging
    start_with:
      - x/messaging/module.yaml
      - x/messaging/pubsub/module.yaml
      - x/messaging/pubsub/pubsub.go
    avoid:
      - reference/standard-service
      - core
    summary: Pub/sub broker primitive under x/messaging; use only for broker mechanics after family-level routing is clear.

  x/messaging/scheduler:
    module: x/messaging
    layer: extension
    role: primitive
    task_families:
      - messaging
    start_with:
      - x/messaging/module.yaml
      - x/messaging/scheduler/module.yaml
      - x/messaging/scheduler/scheduler.go
    avoid:
      - core
      - reference/standard-service
    summary: Scheduling and retry primitive under x/messaging; app-facing scheduled messaging starts from x/messaging.

  x/messaging/webhook:
    module: x/messaging
    layer: extension
    role: adapter
    task_families:
      - messaging
    start_with:
      - x/messaging/module.yaml
      - x/messaging/webhook/module.yaml
      - x/messaging/webhook/in.go
    avoid:
      - core
      - reference/standard-service
    summary: Webhook inbound and outbound delivery adapter under x/messaging; direct starts are only for verification or delivery mechanics.

  x/observability:
    module: x/observability
    layer: extension
    role: app_surface
    task_families:
      - observability_admin
    start_with:
      - x/observability/module.yaml
      - x/observability/observability.go
      - x/observability/exporter.go
    avoid:
      - middleware/httpmetrics
      - x/observability/ops
      - x/observability/devtools
    summary: Canonical observability adapter and exporter family entrypoint.

  x/observability/ops:
    module: x/observability
    layer: extension
    role: app_surface
    task_families:
      - observability_admin
    start_with:
      - x/observability/module.yaml
      - x/observability/ops/module.yaml
      - x/observability/ops/ops.go
    avoid:
      - middleware
      - core
    summary: Protected operations and diagnostics surface under x/observability; keep auth-gated mounting explicit.

  x/observability/devtools:
    module: x/observability
    layer: extension
    role: app_surface
    task_families:
      - observability_admin
    start_with:
      - x/observability/module.yaml
      - x/observability/devtools/module.yaml
      - x/observability/devtools/devtools.go
    avoid:
      - core
      - reference/standard-service
    summary: Local development diagnostics under x/observability; never treat as production bootstrap or core behavior.

  x/data:
    module: x/data
    layer: extension
    role: app_surface
    task_families:
      - store
    start_with:
      - x/data/module.yaml
      - docs/modules/x/data/README.md
    avoid:
      - store
      - x/data/cache
    summary: Canonical advanced data topology family entrypoint.

  x/data/cache:
    module: x/data
    layer: extension
    role: implementation
    task_families:
      - store
    start_with:
      - x/data/module.yaml
      - x/data/cache/module.yaml
      - x/data/cache/doc.go
    avoid:
      - store/cache
      - core
    summary: Cache topology and provider implementations under x/data; stable cache contracts stay in store/cache.

  x/tenant/core:
    module: x/tenant
    layer: extension
    role: policy
    task_families:
      - tenant
    start_with:
      - x/tenant/core/middleware.go
      - x/tenant/core/policy.go
      - x/tenant/core/quota.go
    avoid:
      - middleware
      - store
      - core
    summary: Tenant resolution, validation, quota, policy, and rate-limit core logic.

  x/tenant/store/db:
    module: x/tenant
    layer: extension
    role: adapter
    task_families:
      - tenant
      - store
    start_with:
      - x/tenant/store/db/doc.go
      - x/tenant/store/db/tenant_db.go
    avoid:
      - store/db
      - core
    summary: Tenant-aware SQL adapter layer for automatic query scoping.

  middleware/httpmetrics:
    module: middleware
    layer: stable
    role: primitive
    task_families:
      - middleware
      - observability_admin
    start_with:
      - middleware/httpmetrics/http_metrics.go
      - middleware/module.yaml
    avoid:
      - x/observability
      - core
    summary: Stable transport-level HTTP metrics middleware primitive.

  middleware/requestid:
    module: middleware
    layer: stable
    role: primitive
    task_families:
      - middleware
      - http_endpoint
    start_with:
      - middleware/requestid/request_id.go
      - middleware/module.yaml
    avoid:
      - core
      - x/observability
    summary: Stable request and trace ID propagation middleware primitive.

  x/ai:
    module: x/ai
    layer: extension
    role: app_surface
    task_families:
      - ai
    start_with:
      - x/ai/module.yaml
      - docs/modules/x/ai/README.md
    avoid:
      - x/ai/semanticcache
      - x/ai/distributed
    summary: Canonical AI provider, orchestration, session, and resilience family entrypoint.

  x/ai/semanticcache:
    module: x/ai
    layer: extension
    role: implementation
    task_families:
      - ai
    start_with:
      - x/ai/module.yaml
      - x/ai/semanticcache/module.yaml
      - x/ai/semanticcache/provider.go
    avoid:
      - core
    summary: Embedding-based semantic cache for AI provider responses under x/ai.

  contract:
    module: contract
    layer: stable
    role: primitive
    task_families:
      - http_endpoint
      - security
    start_with:
      - contract/module.yaml
      - contract/response.go
      - contract/errors.go
    avoid:
      - x/rest
      - x/gateway
      - core
    summary: Stable transport contracts for responses, errors, and request metadata.
