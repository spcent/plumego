repo:
  name: plumego
  module: github.com/spcent/plumego
  mode: agent-first
  goals:
    - Fast, low-regret iteration by agents
    - Clear stable surface area
    - Explicit module boundaries
    - Minimal search and edit radius
    - Single canonical implementation path for new work

canonical_authority:
  operations:
    - AGENTS.md
    - docs/CODEX_WORKFLOW.md
  style:
    - docs/CANONICAL_STYLE_GUIDE.md
  architecture:
    - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  maturity:
    - docs/EXTENSION_MATURITY.md
  implementation:
    - reference/standard-service
  routing:
    - specs/task-routing.yaml
  taxonomy:
    - specs/extension-taxonomy.yaml
  hotspots:
    - specs/package-hotspots.yaml
  dependency_rules:
    - specs/dependency-rules.yaml
  schemas:
    - specs/module-manifest.schema.yaml
  checks:
    - specs/checks.yaml
    - specs/deprecation-inventory.yaml
  workflow:
    - specs/change-recipes
    - specs/change-recipes/analysis-only.yaml
    - specs/change-recipes/add-http-endpoint.yaml
    - specs/change-recipes/add-middleware.yaml
    - specs/change-recipes/fix-bug.yaml
    - specs/change-recipes/http-endpoint-bugfix.yaml
    - specs/change-recipes/new-stable-module.yaml
    - specs/change-recipes/new-extension-module.yaml
    - specs/change-recipes/review-only.yaml
    - specs/change-recipes/stable-root-boundary-review.yaml
    - specs/change-recipes/symbol-change.yaml
    - specs/change-recipes/tenant-policy-change.yaml
  task_queue:
    - tasks/cards

layers:
  stable:
    description: Long-lived public packages with narrow responsibilities.
    paths:
      - contract
      - core
      - router
      - middleware
      - security
      - store
      - health
      - log
      - metrics

  extension:
    description: Optional or fast-evolving capabilities.
    paths:
      - x/tenant
      - x/ai
      - x/cache
      - x/data
      - x/devtools
      - x/discovery
      - x/fileapi
      - x/frontend
      - x/gateway
      - x/ipc
      - x/messaging
      - x/mq
      - x/observability
      - x/ops
      - x/pubsub
      - x/resilience
      - x/rest
      - x/scheduler
      - x/webhook
      - x/websocket

  tooling:
    description: Developer tools, checks, and CLI.
    paths:
      - cmd
      - internal/checks
      - internal/testkit
      - internal/buildmeta
      - scripts

  reference:
    description: Canonical implementations.
    paths:
      - reference

top_level_rules:
  allowed_library_roots:
    - core
    - router
    - contract
    - middleware
    - security
    - store
    - health
    - log
    - metrics
    - x
  discouraged_roots:
    - ai
    - tenant
    - net
    - pubsub
    - rest
    - validator
    - utils
    - frontend
  rules:
    - New library packages must live under a stable root or x/*
    - Every top-level x/* extension root must be declared in layers.extension.paths
    - Root package facade is forbidden in the target layout
    - Reference apps define the canonical app structure
    - Stable roots should remain grep-friendly and narrow

agent_workflow:
  machine_readable_sources:
    - specs/task-routing.yaml
    - specs/extension-taxonomy.yaml
    - specs/package-hotspots.yaml
    - specs/dependency-rules.yaml
    - specs/module-manifest.schema.yaml
    - specs/checks.yaml
    - specs/change-recipes
  execution_queue:
    - tasks/cards
  required_steps:
    - Identify target layer and module
    - Establish goal, in-scope paths, and out-of-scope paths before editing
    - Read canonical style and reference app when shaping app structure
    - Read specs/task-routing.yaml for discovery defaults
    - Read specs/package-hotspots.yaml when package choice is ambiguous
    - Read the target module manifest
    - State public API and dependency assumptions before broad changes
    - Split broad or ambiguous work into analysis and implementation passes
    - Keep changes within one primary module when possible
    - Run module tests first
    - Run boundary checks second
    - Run repo-wide checks last
    - Report residual risks and doc-sync impacts at handoff
  defaults:
    max_primary_modules_per_change: 1
    max_files_per_card: 5
    require_manifest_for_new_module: true
    prefer_extension_family_entrypoint: true
    require_explicit_scope: true
    default_no_public_api_change: true
    default_no_dependency_change: true
    require_tests_for_behavior_change: true
    findings_first_review_output: true
  task_contract:
    required_fields:
      - goal
      - in_scope
      - out_of_scope
      - target_module
      - api_and_dependency_policy
      - tests
      - validation
      - done_definition
    default_assumptions:
      - one primary module per change
      - no stable public API changes
      - no new dependencies
      - focused tests required for behavior changes
      - docs sync only for implemented behavior changes
