repo:
  name: plumego
  module: github.com/spcent/plumego
  mode: agent-first
  goals:
    - Fast, low-regret iteration by agents
    - Clear stable surface area
    - Explicit module boundaries
    - Minimal search and edit radius
    - Single canonical implementation path for new work

canonical_authority:
  style:
    - docs/CANONICAL_STYLE_GUIDE.md
  architecture:
    - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  implementation:
    - reference/standard-service
  taxonomy:
    - specs/extension-entrypoints.yaml
  workflow:
    - specs/agent-entrypoints.yaml
    - specs/ownership.yaml
    - specs/change-recipes/add-http-endpoint.yaml
    - specs/change-recipes/add-middleware.yaml
    - specs/change-recipes/new-stable-module.yaml
    - specs/change-recipes/new-extension-module.yaml
  task_queue:
    - tasks/cards
  notes:
    - Reference app defines the canonical application structure
    - reference/standard-service must depend only on stable root packages and stdlib
    - Extension demonstrations must not define the canonical path
    - Extension families must expose one canonical discovery entrypoint
    - Agent workflow metadata must be machine-readable and live under specs/
    - Repo-native execution cards live under tasks/cards

layers:
  stable:
    description: Long-lived public packages with narrow responsibilities.
    paths:
      - contract
      - core
      - router
      - middleware
      - security
      - store
      - health
      - log
      - metrics

  extension:
    description: Optional or fast-evolving capabilities.
    paths:
      - x/tenant
      - x/ai
      - x/cache
      - x/data
      - x/devtools
      - x/discovery
      - x/fileapi
      - x/frontend
      - x/gateway
      - x/ipc
      - x/messaging
      - x/mq
      - x/observability
      - x/ops
      - x/pubsub
      - x/rest
      - x/scheduler
      - x/tenant
      - x/webhook
      - x/websocket

  tooling:
    description: Developer tools, checks, and CLI.
    paths:
      - cmd
      - internal/checks
      - internal/testkit
      - internal/buildmeta

  reference:
    description: Canonical implementations.
    paths:
      - reference

top_level_rules:
  allowed_library_roots:
    - core
    - router
    - contract
    - middleware
    - security
    - store
    - health
    - log
    - metrics
    - x
  discouraged_roots:
    - ai
    - tenant
    - net
    - pubsub
    - rest
    - validator
    - utils
    - frontend
  rules:
    - New library packages must live under a stable root or x/*
    - Every top-level x/* extension root must be declared in layers.extension.paths
    - Root package facade is forbidden in the target layout
    - Reference apps define the canonical app structure
    - Stable roots should remain grep-friendly and narrow

target_cleanup:
  stable_layer_moves:
    - health HTTP handlers move out of health and into reference or extensions
    - protocol gateway adapters move out of contract and into owning extensions
    - tenant-aware middleware stays under x/tenant, not middleware
    - topology-heavy data features move out of stable store and into x/data or x/tenant
    - store/cache topology migration complete; x/cache/distributed and x/cache/redis are now the canonical homes for those capabilities; do not add new topology-heavy packages under stable store/cache
  extension_taxonomy:
    - messaging capabilities should converge under x/messaging
    - transport adapters should converge under their owning extension instead of broad legacy buckets

x_family_taxonomy:
  primary_families:
    - name: x/tenant
      role: Multi-tenant resolution, policy, quota, and tenant-aware adapters
    - name: x/messaging
      role: Canonical messaging entrypoint (coordinates mq, pubsub, scheduler, webhook sub-families)
    - name: x/gateway
      role: Reverse proxy, load balancing, service discovery, protocol edge
    - name: x/rest
      role: Reusable resource-interface layer, CRUD standardization
    - name: x/websocket
      role: WebSocket transport
    - name: x/frontend
      role: Frontend asset serving and SPA fallback
    - name: x/observability
      role: Observability adapters, export wiring, admin surfaces
    - name: x/files
      role: HTTP file upload/download and file storage (canonical home; x/fileapi is a deprecated predecessor)
    - name: x/data
      role: Data topology (read-write split, sharding, distributed cache, ML primitives)
    - name: x/ai
      role: AI provider abstraction, orchestration, semantic caching, streaming, tool-use
  subordinate_families:
    x/messaging:
      - x/mq        # queue primitive
      - x/pubsub    # pub-sub primitive
      - x/scheduler # task scheduling
      - x/webhook   # webhook receiver
    x/gateway:
      - x/discovery # service discovery
      - x/ipc       # in-process transport
    x/observability:
      - x/ops       # protected admin endpoints
      - x/devtools  # local debug routes
    x/data:
      - x/cache     # distributed cache and Redis adapters
  agent_routing:
    - intent: "Change kernel, lifecycle, route structure, transport contracts, transport middleware, auth primitives, storage primitives"
      destination: stable root
      packages: [core, router, contract, middleware, security, store, health, log, metrics]
    - intent: "Change product capability, business feature, protocol adaptation, extension behavior"
      destination: "x/*"
      start_with_primary_family: true
    - intent: "Change application wiring, bootstrap, dependency injection, route registration"
      destination: reference/scaffold
      paths: [reference/standard-service, internal/scaffold]
    - intent: "Change architecture rules, boundary definitions, quality gates, machine-readable specs"
      destination: specs/
    - intent: "Change execution plan, work items, task sequencing"
      destination: tasks/cards/

agent_workflow:
  machine_readable_sources:
    - specs/agent-entrypoints.yaml
    - specs/ownership.yaml
    - specs/change-recipes
  execution_queue:
    - tasks/cards
  required_steps:
    - Identify target layer and module
    - Read canonical style and reference app when shaping app structure
    - Read specs/agent-entrypoints.yaml for discovery defaults
    - Read tasks/cards when the work should follow a repo-native task card
    - Read target module manifest
    - Keep changes within one module when possible
    - Run module tests first
    - Run boundary checks second
    - Run reference smoke checks last
  defaults:
    max_primary_modules_per_change: 1
    max_files_per_card: 5
    require_manifest_for_new_module: true
    prefer_extension_family_entrypoint: true
