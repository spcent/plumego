required:
  - name
  - path
  - layer
  - status
  - owner
  - risk
  - summary
  - responsibilities
  - non_goals
  - allowed_imports
  - forbidden_imports
  - test_commands
  - review_checklist
  - agent_hints

enums:
  layer:
    - stable
    - extension
    - tooling
    - reference
  status:
    - ga
    - beta
    - experimental
  risk:
    - low
    - medium
    - high
    - critical
  stability_tier:
    - ga
    - beta
    - experimental
    - prototype

# Optional fields — not enforced as required but recognized as first-class schema fields.
# Checkers may validate their values when present.
optional_fields:
  suggested_gate_profile: string  # docs_only | single_module_behavior | stable_root_change | cross_module_public_api_release
  stability_tier: enum            # overrides parent family status for subpackages; see enums.stability_tier
  docs_sync_contract: map         # on_status_change / on_api_change / on_behavior_change → list of doc paths

limits:
  responsibilities_max: 7
  non_goals_max: 7
  allowed_imports_max: 12
  forbidden_imports_max: 20
  test_commands_max: 3
  review_checklist_max: 5
  agent_hints_max: 3
