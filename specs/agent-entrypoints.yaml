version: 1

entrypoints:
  app_bootstrap:
    start_with:
      - docs/CANONICAL_STYLE_GUIDE.md
      - specs/repo.yaml
      - reference/standard-service/main.go
      - reference/standard-service/internal/app/app.go
      - reference/standard-service/internal/app/routes.go
    avoid:
      - x/rest
      - x/gateway
      - x/webhook
    notes:
      - Use the reference app for canonical bootstrap shape.
      - Keep route and middleware wiring explicit in app-local code.

  http_endpoint:
    start_with:
      - docs/CANONICAL_STYLE_GUIDE.md
      - reference/standard-service/internal/app/routes.go
      - contract
      - router
    avoid:
      - middleware
    notes:
      - Add one method-plus-path registration per line.
      - Keep business logic out of transport helpers.

  middleware:
    start_with:
      - middleware/module.yaml
      - docs/modules/middleware/README.md
      - docs/CANONICAL_STYLE_GUIDE.md
    avoid:
      - core
      - contract
    notes:
      - Middleware stays transport-only.
      - Do not inject business DTOs or service-locator behavior.

  security:
    start_with:
      - security/module.yaml
      - docs/modules/security/README.md
      - AGENTS.md
    avoid:
      - middleware
      - x/tenant
    notes:
      - Keep verification logic explicit and fail closed.
      - Add negative-path tests for invalid tokens, signatures, and malformed input.

  store:
    start_with:
      - store/module.yaml
      - docs/modules/store/README.md
      - specs/repo.yaml
    avoid:
      - x/tenant
      - x/data
    notes:
      - Use stable store only for transport-agnostic persistence primitives.
      - Move tenant-aware or topology-heavy behavior to the owning extension.

  gateway_edge_transport:
    start_with:
      - x/gateway/module.yaml
      - x/gateway/entrypoints.go
      - specs/extension-entrypoints.yaml
    avoid:
      - x/rest
      - reference/standard-service
    notes:
      - Use x/gateway for proxying, balancing, and protocol-edge work.

  resource_api_standardization:
    start_with:
      - x/rest/module.yaml
      - x/rest/README.md
      - x/rest/spec.go
      - x/rest/entrypoints.go
    avoid:
      - core
      - x/gateway
    notes:
      - Use ResourceSpec plus explicit Register*Routes helpers.
      - Keep bootstrap shape in the reference app.

  messaging:
    start_with:
      - x/messaging/module.yaml
      - x/messaging/entrypoints.go
      - specs/extension-entrypoints.yaml
    avoid:
      - x/mq
      - x/pubsub
      - x/webhook
    notes:
      - Start at x/messaging unless the task is clearly a lower-level primitive.

  tenant:
    start_with:
      - x/tenant/module.yaml
      - docs/modules/x-tenant/README.md
      - docs/architecture/X_TENANT_BLUEPRINT.md
    avoid:
      - middleware
      - store
      - core
    notes:
      - Keep tenant-aware logic inside x/tenant and fail closed on policy errors.
      - Do not move tenant resolution or tenant-aware adapters into stable roots.

  websocket:
    start_with:
      - x/websocket/module.yaml
      - docs/modules/x-websocket/README.md
      - x/websocket/websocket.go
    avoid:
      - core
      - router
    notes:
      - Use x/websocket for app-facing websocket transport work.
      - Keep websocket setup explicit and out of core.

  frontend_asset_serving:
    start_with:
      - x/frontend/module.yaml
      - x/frontend/README.md
      - reference/standard-service
    avoid:
      - core
      - router
    notes:
      - Use x/frontend for static asset serving and SPA fallback behavior.
      - Do not let frontend helpers redefine the canonical application bootstrap path.

  devtools_local_debug:
    start_with:
      - x/devtools/module.yaml
      - x/devtools/devtools.go
      - README.md
    avoid:
      - core
      - reference/standard-service
    notes:
      - Use x/devtools for debug-only routes such as pprof, metrics snapshots, and env reload.
      - Keep devtools explicitly mounted and gated outside production defaults.

  service_discovery:
    start_with:
      - x/discovery/module.yaml
      - specs/extension-entrypoints.yaml
      - specs/repo.yaml
    avoid:
      - core
      - store
    notes:
      - Use x/discovery for service lookup and dynamic endpoint discovery concerns.
      - Keep discovery adapters out of stable roots unless they become durable primitives.

  ops_admin_surface:
    start_with:
      - x/ops/module.yaml
      - x/observability/module.yaml
      - specs/extension-entrypoints.yaml
    avoid:
      - health
      - core
    notes:
      - Use x/ops for protected admin endpoints and x/observability for broader adapter work.
      - Keep HTTP health ownership outside health and keep admin surfaces explicitly gated.

  observability_admin:
    start_with:
      - x/observability/module.yaml
      - x/ops/module.yaml
    avoid:
      - core
      - health
    notes:
      - Use x/ops only for protected admin surfaces.
      - Keep health HTTP ownership outside health.
