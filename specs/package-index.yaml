version: 1

metadata:
  purpose: Package-level hotspot index for tasks where module-level guidance is not specific enough.
  scope:
    - Only ambiguity hotspots
    - Not a replacement for module manifests
    - Not a full package catalog
  read_after:
    - docs/CANONICAL_STYLE_GUIDE.md
    - specs/repo.yaml
    - specs/agent-entrypoints.yaml
  rules:
    - Add entries only for packages where the wrong package choice causes notable rework.
    - Keep start_with and avoid paths concrete and bounded.
    - Prefer package-level role labels over long prose.

role_definitions:
  app_surface: App-facing transport or capability entrypoint.
  implementation: Concrete implementation package behind an app-facing or stable contract.
  primitive: Stable or reusable low-level building block with narrow responsibility.
  policy: Package focused on validation, policy, or decision logic.
  adapter: Package that adapts one layer to another without owning bootstrap.

packages:
  x/fileapi:
    module: x/fileapi
    layer: extension
    role: app_surface
    task_families:
      - file_api
    start_with:
      - x/fileapi/module.yaml
      - x/fileapi/handler.go
      - docs/modules/x-fileapi/README.md
    avoid:
      - x/data/file
      - store/file
    summary: App-facing file upload, download, metadata, and temporary URL transport.
    responsibilities:
      - HTTP file endpoints
      - multipart request parsing
      - tenant context extraction for file APIs
      - streaming file responses
    non_goals:
      - storage backend implementation
      - pure file interfaces
      - app bootstrap
    validations:
      - go test -race -timeout 60s ./x/fileapi/...
      - go test -timeout 20s ./x/fileapi/...
      - go vet ./x/fileapi/...

  x/data/file:
    module: x/data
    layer: extension
    role: implementation
    task_families:
      - file_api
      - tenant
      - store
    start_with:
      - x/data/file/module.yaml
      - x/data/file/local.go
      - x/data/file/metadata.go
    avoid:
      - x/fileapi
      - store/file
    summary: Tenant-aware file storage and metadata implementations.
    responsibilities:
      - tenant-aware local and S3 storage
      - metadata persistence
      - path isolation
      - backend-specific behavior
    non_goals:
      - HTTP transport behavior
      - pure file contracts
      - app bootstrap
    validations:
      - go test -race -timeout 60s ./x/data/file/...
      - go test -timeout 20s ./x/data/file/...
      - go vet ./x/data/file/...

  x/rest:
    module: x/rest
    layer: extension
    role: app_surface
    task_families:
      - resource_api_standardization
    start_with:
      - x/rest/module.yaml
      - x/rest/spec.go
      - x/rest/entrypoints.go
    avoid:
      - reference/standard-service
      - x/gateway
    summary: Reusable resource-interface layer for CRUD-standardized APIs.
    responsibilities:
      - resource specs
      - reusable route registration helpers
      - query and pagination conventions
    non_goals:
      - app bootstrap
      - edge proxy topology
      - business repositories
    validations:
      - go test -race -timeout 60s ./x/rest/...
      - go test -timeout 20s ./x/rest/...
      - go vet ./x/rest/...

  x/gateway:
    module: x/gateway
    layer: extension
    role: app_surface
    task_families:
      - gateway_edge_transport
    start_with:
      - x/gateway/module.yaml
      - x/gateway/entrypoints.go
      - x/gateway/proxy.go
    avoid:
      - x/rest
      - reference/standard-service
    summary: App-facing gateway and edge transport entrypoint.
    responsibilities:
      - reverse proxy behavior
      - balancing and rewrite helpers
      - gateway-local cache and circuit behavior
    non_goals:
      - app bootstrap
      - reusable CRUD conventions
      - business gateway policy
    validations:
      - go test -race -timeout 60s ./x/gateway/...
      - go test -timeout 20s ./x/gateway/...
      - go vet ./x/gateway/...

  x/tenant/core:
    module: x/tenant
    layer: extension
    role: policy
    task_families:
      - tenant
    start_with:
      - x/tenant/core/middleware.go
      - x/tenant/core/policy.go
      - x/tenant/core/quota.go
    avoid:
      - middleware
      - store
      - core
    summary: Tenant resolution, validation, quota, policy, and rate-limit core logic.
    responsibilities:
      - tenant ID validation
      - quota decisions
      - policy evaluation
      - tenant context behavior
    non_goals:
      - stable middleware expansion
      - generic DB abstraction
      - app bootstrap
    validations:
      - go test -race -timeout 60s ./x/tenant/core/...
      - go test -timeout 20s ./x/tenant/core/...
      - go vet ./x/tenant/core/...

  x/tenant/store/db:
    module: x/tenant
    layer: extension
    role: adapter
    task_families:
      - tenant
      - store
    start_with:
      - x/tenant/store/db/doc.go
      - x/tenant/store/db/tenant_db.go
    avoid:
      - store/db
      - core
    summary: Tenant-aware SQL adapter layer for automatic query scoping.
    responsibilities:
      - tenant-scoped SQL rewriting
      - context-driven tenant extraction for DB access
      - DB isolation helpers
    non_goals:
      - generic SQL store primitives
      - app bootstrap
      - business repositories
    validations:
      - go test -race -timeout 60s ./x/tenant/store/db/...
      - go test -timeout 20s ./x/tenant/store/db/...
      - go vet ./x/tenant/store/db/...

  middleware/httpmetrics:
    module: middleware
    layer: stable
    role: primitive
    task_families:
      - middleware
      - observability_admin
    start_with:
      - middleware/httpmetrics/http_metrics.go
      - middleware/module.yaml
    avoid:
      - x/observability
      - core
    summary: Stable transport-level HTTP metrics middleware primitive.
    responsibilities:
      - request metrics collection
      - response recording
      - route-aware transport observation
    non_goals:
      - exporter wiring
      - app bootstrap
      - broad observability catalog behavior
    validations:
      - go test -race -timeout 60s ./middleware/httpmetrics/...
      - go test -timeout 20s ./middleware/httpmetrics/...
      - go vet ./middleware/httpmetrics/...

  middleware/requestid:
    module: middleware
    layer: stable
    role: primitive
    task_families:
      - middleware
      - http_endpoint
    start_with:
      - middleware/requestid/request_id.go
      - middleware/module.yaml
    avoid:
      - core
      - x/observability
    summary: Stable request and trace ID propagation middleware primitive.
    responsibilities:
      - request ID extraction
      - request ID generation
      - trace ID attachment to request context and headers
    non_goals:
      - business-specific request policy
      - app bootstrap
      - metrics export wiring
    validations:
      - go test -race -timeout 60s ./middleware/requestid/...
      - go test -timeout 20s ./middleware/requestid/...
      - go vet ./middleware/requestid/...

  contract:
    module: contract
    layer: stable
    role: primitive
    task_families:
      - http_endpoint
      - security
    start_with:
      - contract/module.yaml
      - contract/response.go
      - contract/errors.go
    avoid:
      - x/rest
      - x/gateway
      - core
    summary: Stable transport contracts for responses, errors, and request metadata.
    responsibilities:
      - structured error shape
      - response helpers
      - request metadata helpers
      - trace and observability contract helpers
    non_goals:
      - protocol-family gateways
      - app bootstrap
      - business response envelopes
    validations:
      - go test -race -timeout 60s ./contract/...
      - go test -timeout 20s ./contract/...
      - go vet ./contract/...
