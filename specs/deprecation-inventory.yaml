version: 1
mode: strict
summary: >
  Inventory of intentional deprecated, compatibility, alias, TODO, and
  unsupported-operation markers. The deprecation-inventory check fails in strict
  mode on new markers that are not registered here or entries that still need a
  v1 keep/remove decision.

entries:
  - id: cmd-plumego-no-todo-test-assertions
    category: test_assertion
    status: keep
    owner: tooling
    decision: Tests intentionally mention TODO markers to prevent generated scaffolds from emitting placeholder comments.
    replacement: none
    paths:
      - cmd/plumego/internal/codegen/codegen_test.go
      - cmd/plumego/internal/scaffold/scaffold_test.go
      - cmd/plumego/internal/testassert/todo.go

  - id: cmd-plumego-config-redact-flag-compatibility
    category: compatibility_flag
    status: keep
    owner: tooling
    decision: Keep config show --redact accepted for compatibility while redaction is now the default behavior.
    replacement: --show-secrets
    paths:
      - cmd/plumego/commands/config.go

  - id: x-rest-default-unsupported-resource-methods
    category: unsupported_operation
    status: keep
    owner: rest
    decision: Base resource methods return explicit not-implemented responses unless the concrete resource overrides them.
    replacement: concrete resource method implementations
    paths:
      - x/rest/resource.go
      - x/rest/routes_test.go

  - id: internal-response-recorder-adapter-aliases
    category: internal_alias
    status: keep
    owner: transport
    decision: Internal middleware response recorder aliases keep middleware internals on one shared httputil implementation.
    replacement: internal/httputil.ResponseRecorder and internal/httputil.BufferedResponseRecorder
    paths:
      - middleware/internal/transport/http.go
      - middleware/internal/transport/response_buffer.go
      - middleware/internal/observability/helpers.go

  - id: middleware-httpmetrics-observer-alias
    category: public_alias
    status: keep
    owner: metrics
    decision: Keep for v1. The middleware/httpmetrics package is the app-facing HTTP metrics middleware surface, and Observer keeps handler wiring local without widening metrics ownership.
    replacement: metrics.HTTPObserver
    paths:
      - middleware/httpmetrics/http_metrics.go

  - id: x-gateway-graphql-introspection-deprecated-field
    category: protocol_literal
    status: keep
    owner: gateway
    decision: includeDeprecated is part of GraphQL introspection syntax and is not a Plumego deprecation marker.
    replacement: none
    paths:
      - x/gateway/protocol/graphql.go

  - id: x-gateway-family-entrypoint-aliases
    category: public_alias
    status: keep
    owner: gateway
    decision: Keep as experimental x/gateway family entrypoints. They improve agent discovery for gateway wiring and are not promoted to stable API in v1.
    replacement: direct x/gateway types and x/gateway/protocol types
    paths:
      - x/gateway/entrypoints.go

  - id: x-websocket-merged-main-compatibility-aliases
    category: public_alias
    status: keep
    owner: realtime
    decision: Keep as experimental x/websocket compatibility aliases after merging origin/main so existing callers and release-branch tests can use either naming family while x/websocket remains outside stable-root v1.
    replacement: NewSimpleHS256TokenAuth, VerifyJWT, ReadMessageReader, and NewHubWithConfigE
    paths:
      - x/websocket/auth.go
      - x/websocket/hub.go
      - x/websocket/stream.go

  - id: x-discovery-optional-capability-contract
    category: unsupported_operation
    status: keep
    owner: discovery
    decision: Provider capabilities may be unsupported and are represented by ErrNotSupported.
    replacement: provider-specific implementation
    paths:
      - x/gateway/discovery/discovery.go

  - id: x-cache-distributed-new-e-deprecation
    category: compatibility_behavior
    status: keep
    owner: cache
    decision: Keep NewE as an experimental x/data/cache migration helper while NewWithConfig is the canonical constructor with construction errors.
    replacement: distributed.NewWithConfig
    paths:
      - x/data/cache/distributed/distributed.go

  - id: reference-workerfleet-unimplemented-registration
    category: reference_placeholder
    status: keep
    owner: reference
    decision: Keep outside the v1 stable release surface. Workerfleet is not the canonical reference app and remains a non-blocking reference placeholder.
    replacement: implemented worker registration flow
    paths:
      - reference/workerfleet/internal/handler/worker_register.go

  - id: reference-workerfleet-view-and-store-aliases
    category: reference_alias
    status: keep
    owner: reference
    decision: Workerfleet reference layers alias domain records for local platform package readability.
    replacement: direct domain types
    paths:
      - reference/workerfleet/internal/platform/store/types.go

  - id: reference-workerfleet-app-compatibility-markers
    category: reference_placeholder
    status: keep
    owner: reference
    decision: Workerfleet app-layer not-implemented and detail-view alias markers remain outside the stable-root v1 surface while the reference evolves through its own active cards.
    replacement: implemented workerfleet app behavior and direct view types
    paths:
      - reference/workerfleet/internal/app/types.go

  - id: x-devtools-removed-legacy-alias-regression
    category: regression_test
    status: keep
    owner: devtools
    decision: Test text asserts old devtools legacy routes stay removed.
    replacement: none
    paths:
      - x/observability/devtools/devtools_test.go

  - id: x-devtools-pubsubdebug-test-double
    category: test_double
    status: keep
    owner: devtools
    decision: Test double returns not implemented for behavior outside the pubsub debug component test scope.
    replacement: none
    paths:
      - x/observability/devtools/pubsubdebug/component_test.go

  - id: x-ai-semanticcache-test-double
    category: test_double
    status: keep
    owner: ai-gateway
    decision: Mock providers return not implemented for methods outside semantic-cache test scope.
    replacement: none
    paths:
      - x/ai/semanticcache/provider_test.go

  - id: x-ai-multimodal-provider-response-alias
    category: public_alias
    status: keep
    owner: ai-gateway
    decision: Keep as experimental x/ai/multimodal API. The alias makes multimodal completion responses reuse the stable provider response model while the subpackage remains experimental.
    replacement: provider.CompletionResponse
    paths:
      - x/ai/multimodal/provider.go

  - id: x-ai-multimodal-message-role-alias
    category: public_alias
    status: keep
    owner: ai-gateway
    decision: Keep as experimental x/ai/multimodal API. The alias keeps message roles aligned with provider.Role and avoids a second role enum.
    replacement: provider.Role
    paths:
      - x/ai/multimodal/types.go

  - id: x-data-idempotency-stable-contract-reexports
    category: public_alias
    status: keep
    owner: persistence
    decision: Keep as experimental x/data convenience aliases. Durable providers intentionally sit behind the stable store/idempotency contract without promoting x/data/idempotency to stable.
    replacement: direct store/idempotency types
    paths:
      - x/data/idempotency/store.go

  - id: x-data-file-metadata-test-double
    category: test_double
    status: keep
    owner: persistence
    decision: Metadata test doubles return not implemented for methods outside the target test behavior.
    replacement: none
    paths:
      - x/data/file/metadata_test.go

  - id: x-ipc-remote-address-string-compatibility
    category: compatibility_behavior
    status: keep
    owner: ipc
    decision: Keep as experimental x/gateway/ipc compatibility helper. It preserves migration ergonomics while Client.RemoteAddr remains the preferred typed API.
    replacement: Client.RemoteAddr().String()
    paths:
      - x/gateway/ipc/ipc.go

  - id: x-webhook-provider-error-compatibility
    category: compatibility_behavior
    status: keep
    owner: webhook
    decision: Generic inbound verification errors map to provider-specific sentinels for compatibility.
    replacement: shared verification errors
    paths:
      - x/messaging/webhook/inbound_github.go
      - x/messaging/webhook/inbound_stripe.go

  - id: x-messaging-family-entrypoint-aliases
    category: public_alias
    status: keep
    owner: messaging
    decision: Keep as experimental x/messaging family entrypoints. They reduce agent routing ambiguity for app-facing messaging work and do not promote x/messaging/pubsub or x/messaging/webhook to stable.
    replacement: direct x/messaging/pubsub and x/messaging/webhook imports
    paths:
      - x/messaging/entrypoints.go

  - id: x-mq-protocol-bridge-placeholders
    category: unsupported_operation
    status: keep
    owner: messaging
    decision: Keep as explicit unsupported experimental behavior. MQTT and AMQP bridge configuration fails closed and remains documented as unavailable in v1.
    replacement: implemented protocol bridge or removed config surface
    paths:
      - x/messaging/mq/broker_routes.go
      - x/messaging/mq/broker.go
      - x/messaging/mq/config.go
      - x/messaging/mq/errors.go
      - x/messaging/mq/mq_test.go

  - id: x-mq-broker-compatibility-defaults
    category: compatibility_behavior
    status: keep
    owner: messaging
    decision: Keep as experimental x/messaging/mq defaults. Ack support and trie matching remain opt-in to avoid changing broker behavior during v1 stable-root release.
    replacement: explicit options
    paths:
      - x/messaging/mq/config.go

  - id: x-mq-pubsub-reexports
    category: public_alias
    status: keep
    owner: messaging
    decision: Keep as experimental x/messaging/mq compatibility aliases. Direct x/messaging/pubsub imports remain preferred for new low-level pubsub work, while x/messaging/mq keeps broker compatibility.
    replacement: direct x/messaging/pubsub types
    paths:
      - x/messaging/mq/types.go

  - id: x-mq-test-doubles
    category: test_double
    status: keep
    owner: messaging
    decision: Tests use not-implemented stubs for behavior outside the current assertion scope.
    replacement: none
    paths:
      - x/messaging/mq/priority_test.go
      - x/messaging/mq/mq_test.go
