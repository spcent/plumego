version: 1

families:
  messaging:
    canonical_entrypoint: x/messaging
    role: Only app-facing capability entrypoint for message-oriented product work.
    start_here:
      - x/messaging
    primitives:
      - x/mq
      - x/pubsub
      - x/scheduler
      - x/webhook
    rules:
      - Start all new app-facing messaging feature discovery in x/messaging.
      - Treat x/mq and x/pubsub as subordinate primitives, not user-facing family entrypoints.
      - Treat x/webhook as a subordinate messaging sub-capability unless the task is narrowly about webhook verification or delivery mechanics.

  gateway:
    canonical_entrypoint: x/gateway
    role: Capability entrypoint for API gateway, reverse proxy, and edge transport work.
    start_here:
      - x/gateway
    primitives:
      - x/ipc
    rules:
      - Start new gateway and transport-edge discovery in x/gateway.
      - Treat x/ipc as a narrow transport primitive, not a general app integration root.

  resource_api:
    canonical_entrypoint: x/rest
    role: Shared interface layer for reusable resource APIs, CRUD conventions, pagination, and repository-backed controller wiring.
    start_here:
      - x/rest
    primitives: []
    rules:
      - Start reusable resource-interface and CRUD-standardization work in x/rest.
      - Do not use x/rest to define application bootstrap or gateway proxy topology.

  observability:
    canonical_entrypoint: x/observability
    role: Capability entrypoint for adapter-heavy tracing, metrics export, and higher-level diagnostics.
    start_here:
      - x/observability
    primitives:
      - x/ops
    rules:
      - Keep stable middleware transport-only.
      - Use x/ops for protected admin endpoints only, not as the default observability discovery root.

  frontend:
    canonical_entrypoint: x/frontend
    role: Capability entrypoint for static asset and frontend bundle serving.
    start_here:
      - x/frontend
    primitives: []
    rules:
      - Do not let frontend serving define the canonical application path.

  tenant:
    canonical_entrypoint: x/tenant
    role: Capability entrypoint for multi-tenant transport, policy, quota, and storage features.
    start_here:
      - x/tenant
    primitives: []
    rules:
      - Tenant-aware behavior must stay out of stable middleware and stable store.
