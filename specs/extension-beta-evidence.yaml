version: 1

purpose: >
  Machine-readable evidence ledger for promoting extension modules from
  experimental to beta. This file records what must be proven before a module
  status changes; it does not grant beta status by itself.

promotion_target: beta
policy: docs/EXTENSION_STABILITY_POLICY.md

required_evidence:
  release_history:
    description: Two consecutive minor releases without exported API changes.
    required: true
  api_snapshots:
    description: Exported API snapshots for the baseline and candidate release refs.
    required: true
    artifact_root: docs/extension-evidence/snapshots
  boundary_checks:
    description: Dependency, manifest, and module-local checks pass at the candidate ref.
    required: true
  docs:
    description: Module primer documents current behavior, validation, and boundaries.
    required: true
  owner_signoff:
    description: Module owner confirms beta criteria and accepts compatibility obligations.
    required: true
  open_regressions:
    description: No known regressions against documented behavior.
    required: true

candidate_defaults:
  status: experimental
  required_release_count: 2
  api_snapshot_state: missing
  owner_signoff: missing
  promotion_blocked: true
  blockers:
    - release_history_missing
    - api_snapshot_missing
    - owner_signoff_missing

candidates:
  - module: x/rest
    owner: platform-api
    current_status: experimental
    evidence_doc: docs/extension-evidence/x-rest.md
    release_refs: []
    api_snapshots:
      - docs/extension-evidence/snapshots/first-batch/x-rest-head.snapshot
    blockers:
      - release_history_missing
      - api_snapshot_missing
      - owner_signoff_missing

