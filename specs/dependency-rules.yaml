version: 1

rules:
  stable_must_not_depend_on_extension: true
  library_must_not_depend_on_reference: true
  root_facade_forbidden: true

modules:
  contract:
    path: contract
    layer: stable
    allow:
      - stdlib
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - x/**
      - reference/**
      - cmd/**
    # ── Scope constraints (enforced at review time) ──────────────────────────
    # contract owns: request/response envelopes, error types, HTTP helpers,
    # context key accessors, binding helpers.
    # contract must NOT contain:
    #   - Tracing implementation types (Tracer, Span, SpanCollector, Sampler)  → x/observability
    #   - Session lifecycle: SessionStore, SessionValidator, RefreshManager → x/tenant
    #   - Metric aggregation types                                       → x/observability
    # ── API shape rules ──────────────────────────────────────────────────────
    # context_accessors:
    #   pattern: With{Type}(ctx, v) + {Type}FromContext(ctx)   (no ContextWith* prefix)
    #   key_type: unexported zero-value struct, always inlined (no package-level var)
    # error_construction:
    #   canonical: NewErrorBuilder() or ErrorType.Meta()
    #   forbidden: adding New{Specific}Error() constructors beyond existing 7
    # response_write:
    #   canonical: WriteResponse(w, r, status, data, meta)
    #   forbidden: per-handler response envelope shapes
    # deprecation:
    #   policy: remove deprecated symbols in the same PR as the last caller migration;
    #           no dead wrapper functions at merge time

  health:
    path: health
    layer: stable
    allow:
      - stdlib
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - x/**

  log:
    path: log
    layer: stable
    allow:
      - stdlib
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - x/**

  metrics:
    path: metrics
    layer: stable
    allow:
      - stdlib
      - log
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - x/**

  router:
    path: router
    layer: stable
    allow:
      - stdlib
      - contract
    deny:
      - core/**
      - security/**
      - store/**
      - x/**
      - reference/**
      - cmd/**

  middleware:
    path: middleware
    layer: stable
    allow:
      - stdlib
      - contract
      - log
      - metrics
      - security
    deny:
      - core/**
      - store/**
      - x/**
      - reference/**
      - cmd/**

  security:
    path: security
    layer: stable
    allow:
      - stdlib
      - contract
      - log
    deny:
      - core/**
      - router/**
      - store/db/**
      - store/file/**
      - store/cache/**
      - store/idempotency/**
      - x/**
      - reference/**
      - cmd/**

  store:
    path: store
    layer: stable
    allow:
      - stdlib
      - contract
      - log
      - metrics
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - x/**
      - reference/**
      - cmd/**

  core:
    path: core
    layer: stable
    allow:
      - stdlib
      - contract
      - router
      - middleware
      - health
      - log
      - metrics
    deny:
      - x/**
      - reference/**
      - cmd/**
      - store/db/**
      - store/cache/**
      - store/file/**
      - store/idempotency/**
      - store/kv/**

  internal/semver:
    path: internal/semver
    layer: internal
    allow:
      - stdlib
    declared_callers:
      - x/ai/marketplace
    deny:
      - core/**
      - router/**
      - contract/**
      - middleware/**
      - security/**
      - store/**
      - health/**
      - log/**
      - metrics/**
      - x/**
      - reference/**
      - cmd/**

  internal/httputil:
    path: internal/httputil
    layer: internal
    allow:
      - stdlib
      - contract
    declared_callers:
      - middleware
      - x/gateway
      - x/gateway/cache
      - x/gateway/transform
      - x/messaging/webhook
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - health/**
      - log/**
      - metrics/**
      - x/**
      - reference/**
      - cmd/**

  middleware/internal/telemetry:
    path: middleware/internal/telemetry
    layer: internal
    allow:
      - stdlib
      - contract
      - internal/httputil
      - middleware/requestid
    declared_callers:
      - middleware
    deny:
      - core/**
      - router/**
      - security/**
      - store/**
      - health/**
      - log/**
      - metrics/**
      - x/**
      - reference/**
      - cmd/**

  internal/nethttp:
    path: internal/nethttp
    layer: internal
    allow:
      - stdlib
    declared_callers:
      - x/messaging
    deny:
      - core/**
      - router/**
      - contract/**
      - middleware/**
      - security/**
      - store/**
      - health/**
      - log/**
      - metrics/**
      - x/**
      - reference/**
      - cmd/**

  internal/stringsx:
    path: internal/stringsx
    layer: internal
    allow:
      - stdlib
    declared_callers:
      - x/messaging/webhook
    deny:
      - core/**
      - router/**
      - contract/**
      - middleware/**
      - security/**
      - store/**
      - health/**
      - log/**
      - metrics/**
      - x/**
      - reference/**
      - cmd/**

  internal/config:
    path: internal/config
    layer: internal
    allow:
      - stdlib
      - log
    declared_callers:
      - x/observability/devtools
    deny:
      - core/**
      - router/**
      - contract/**
      - middleware/**
      - security/**
      - store/**
      - health/**
      - metrics/**
      - x/**
      - reference/**
      - cmd/**

  x/data/cache:
    path: x/data/cache
    layer: extension
    allow:
      - stdlib
      - store/cache
      - contract
      - log
      - metrics
    deny:
      - core/**
      - middleware/**
      - x/tenant/**
      - x/ai/**
      - reference/**
      - cmd/**

  x/data/pgx:
    path: x/data/pgx
    layer: extension
    allow:
      - stdlib
      - store/db
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - x/tenant/**
      - reference/**
      - cmd/**

  x/data/sqlx:
    path: x/data/sqlx
    layer: extension
    allow:
      - stdlib
      - store/db
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - x/tenant/**
      - reference/**
      - cmd/**

  x/data/migrate:
    path: x/data/migrate
    layer: extension
    allow:
      - stdlib
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - x/tenant/**
      - reference/**
      - cmd/**

  x/tenant:
    path: x/tenant
    layer: extension
    # status: experimental (x/tenant/module.yaml). Stable packages cannot import x/tenant
    # because every stable module's deny list includes x/** and the global
    # stable_must_not_depend_on_extension rule is enforced by the dependency checker.
    allow:
      - stdlib
      - contract
      - middleware
      - security
      - store
      - log
      - metrics
    deny:
      - reference/**
      - cmd/**

  x/fileapi:
    path: x/fileapi
    layer: extension
    # status: experimental. HTTP transport for tenant-aware file operations.
    allow:
      - stdlib
      - contract
      - store/file
      - x/data/file
      - x/tenant
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - x/ai/**
      - reference/**
      - cmd/**

  x/validate:
    path: x/validate
    layer: extension
    allow:
      - stdlib
      - contract
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - x/**
      - reference/**
      - cmd/**

  x/openapi:
    path: x/openapi
    layer: extension
    allow:
      - stdlib
      - router
      - contract
    deny:
      - core/**
      - middleware/**
      - security/**
      - store/**
      - x/**
      - reference/**
      - cmd/**

  x/rpc:
    path: x/rpc
    layer: extension
    allow:
      - stdlib
      - contract
      - log
      - x/observability
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - health/**
      - metrics/**
      - x/tenant/**
      - x/ai/**
      - x/data/**
      - x/fileapi/**
      - x/frontend/**
      - x/gateway/**
      - x/messaging/**
      - x/openapi/**
      - x/resilience/**
      - x/rest/**
      - x/websocket/**
      - reference/**
      - cmd/**

  x/rpc/client:
    path: x/rpc/client
    layer: extension
    allow:
      - stdlib
      - contract
      - log
      - x/observability
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - x/tenant/**
      - x/ai/**
      - x/data/**
      - x/fileapi/**
      - x/frontend/**
      - x/gateway/**
      - x/messaging/**
      - x/openapi/**
      - x/resilience/**
      - x/rest/**
      - x/websocket/**
      - reference/**
      - cmd/**

  x/rpc/gateway:
    path: x/rpc/gateway
    layer: extension
    allow:
      - stdlib
      - contract
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - x/tenant/**
      - x/ai/**
      - x/data/**
      - x/fileapi/**
      - x/frontend/**
      - x/gateway/**
      - x/messaging/**
      - x/openapi/**
      - x/resilience/**
      - x/rest/**
      - x/websocket/**
      - reference/**
      - cmd/**

  x/rpc/server:
    path: x/rpc/server
    layer: extension
    allow:
      - stdlib
      - x/observability
    deny:
      - core/**
      - router/**
      - contract/**
      - middleware/**
      - security/**
      - store/**
      - health/**
      - log/**
      - metrics/**
      - x/tenant/**
      - x/ai/**
      - x/data/**
      - x/fileapi/**
      - x/frontend/**
      - x/gateway/**
      - x/messaging/**
      - x/openapi/**
      - x/resilience/**
      - x/rest/**
      - x/websocket/**
      - reference/**
      - cmd/**

  x/messaging/webhook:
    path: x/messaging/webhook
    layer: extension
    # status: experimental. Inbound verification, outbound delivery, and PubSub bridge.
    allow:
      - stdlib
      - contract
      - middleware
      - router
      - health
      - log
      - x/messaging/pubsub
    deny:
      - core/**
      - x/tenant/**
      - x/ai/**
      - reference/**
      - cmd/**

  x/messaging:
    path: x/messaging
    layer: extension
    # status: experimental. Canonical app-facing messaging family entrypoint.
    allow:
      - stdlib
      - contract
      - log
      - metrics
      - router
      - security
      - store
      - x/resilience
      - x/messaging/mq
      - x/messaging/pubsub
      - x/messaging/scheduler
      - x/messaging/webhook
      - x/tenant
    deny:
      - core/**
      - x/ai/**
      - reference/**
      - cmd/**

  x/resilience:
    path: x/resilience
    layer: extension
    # status: experimental. Reusable circuit-breaker and rate-limit primitives.
    allow:
      - stdlib
      - contract
      - middleware
    deny:
      - core/**
      - security/**
      - store/**
      - x/tenant/**
      - reference/**
      - cmd/**

  x/ai:
    path: x/ai
    layer: extension
    # status: experimental. AI gateway capabilities: providers, sessions, streaming, tools, resilience.
    # Sub-packages may carry individual beta surfaces (see docs/concepts/extension-maturity.md).
    # x/ai/metrics defines an AI-specific Collector interface deliberately distinct from the
    # stable metrics.AggregateCollector. See x/ai/metrics package doc for the boundary rationale.
    allow:
      - stdlib
      - contract
      - log
      - metrics
      - x/resilience
    deny:
      - core/**
      - router/**
      - middleware/**
      - security/**
      - store/**
      - x/tenant/**
      - x/websocket/**
      - x/messaging/webhook/**
      - reference/**
      - cmd/**

  x/frontend:
    path: x/frontend
    layer: extension
    # status: beta. Static and embedded asset serving with directory safety and content negotiation.
    allow:
      - stdlib
      - contract
      - log
      - router
    deny:
      - core/**
      - middleware/**
      - security/**
      - store/**
      - x/tenant/**
      - x/ai/**
      - reference/**
      - cmd/**

  x/gateway:
    path: x/gateway
    layer: extension
    # status: beta. Reverse proxy, rewrite, balancing, edge transport, service discovery, IPC.
    # Sub-packages (discovery, ipc, cache, transform, protocol, protocolmw) may import a narrower set.
    allow:
      - stdlib
      - contract
      - router
      - log
      - health
      - metrics
      - middleware
      - security
      - x/resilience
      - internal/httputil
    deny:
      - core/**
      - store/**
      - x/tenant/**
      - x/ai/**
      - x/messaging/**
      - reference/**
      - cmd/**

  x/observability:
    path: x/observability
    layer: extension
    # status: beta (top-level exporter/tracer/collector wiring). Sub-packages devtools and ops are
    # experimental. x/observability/devtools imports x/messaging/pubsub for debug pub/sub inspection;
    # this is a declared cross-extension dependency confined to the devtools sub-package.
    allow:
      - stdlib
      - contract
      - log
      - metrics
      - middleware
      - store
      - core
      - health
      - router
      - security
      - internal/config
      - x/messaging/pubsub
    deny:
      - x/tenant/**
      - x/ai/**
      - x/data/**
      - x/fileapi/**
      - x/frontend/**
      - x/rest/**
      - x/rpc/**
      - x/validate/**
      - x/websocket/**
      - reference/**
      - cmd/**

  x/rest:
    path: x/rest
    layer: extension
    # status: beta. Resource controller and CRUD route conventions.
    allow:
      - stdlib
      - contract
      - log
      - router
      - store
      - middleware
    deny:
      - core/**
      - security/**
      - x/tenant/**
      - x/ai/**
      - x/gateway/**
      - x/messaging/**
      - x/observability/**
      - reference/**
      - cmd/**

  x/websocket:
    path: x/websocket
    layer: extension
    # status: beta. WebSocket hub, room auth, explicit route registration. No core bootstrap ownership.
    allow:
      - stdlib
      - contract
      - health
      - log
      - middleware
      - router
      - security
    deny:
      - core/**
      - store/**
      - x/tenant/**
      - x/ai/**
      - x/messaging/**
      - reference/**
      - cmd/**

special_rules:
  forbidden_import_patterns:
    - github.com/spcent/plumego
  notes:
    - Reference app define the canonical application shape
    - Stable packages must never import x/*
    - Core stays a kernel and must not grow feature-catalog dependencies
    - Control-plane files under docs/, specs/, and tasks/ are guidance surfaces, not library import roots
    - Router stays transport-structure only
    - Middleware must stay transport-only and must not import store
    - Stable middleware must not grow tenant resolution, tenant policy, or tenant quota behavior
    - If a change would force stable middleware or core to learn tenant, data-topology, or protocol-family details, move the behavior into the owning x/* family instead
    - Tenant-aware storage belongs under x/tenant/store
    - Stable store must not grow tenant-aware adapters or tenant-specific storage policy
    - Protocol gateway families belong in their owning extension package, not in contract
    - Health HTTP endpoint ownership belongs outside health
    - High-level data topology belongs in x/data or x/tenant, not in the stable store layer
    - Topology-heavy and provider-specific cache implementations belong in x/data/cache, not stable store/cache
    - middleware/internal/telemetry is the shared internal helper surface for stable transport observability middleware; keep it internal to middleware and route exporter or pipeline wiring to x/observability or the owning app
