name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: |
          set -euo pipefail
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "gofmt check failed. Run: gofmt -w ."
            echo "$files"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run race tests
        run: go test -race -timeout 60s ./...

      - name: Run standard tests
        run: go test -timeout 20s ./...
