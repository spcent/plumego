name: "CodeQL Config"

paths-ignore:
  - 'examples/**'
  - 'docs/**'
  # ddl.go is an authenticated admin DDL console that intentionally accepts
  # user-authored SQL for view definitions (CREATE VIEW ... AS <user_sql>).
  # Inline suppression comments (codeql/lgtm) do not suppress this alert in
  # GitHub's CodeQL implementation; paths-ignore is the only programmatic option.
  # All other handlers (auth, rows, redis, mongodb) remain analyzed.
  - 'use-cases/dbadmin/internal/handler/ddl.go'

queries:
  - uses: security-and-quality

# Suppress false positive XSS alerts for middleware infrastructure
# These files are part of the response processing pipeline and pass through
# response data without injecting user input into HTML contexts.
#
# For actual HTML generation, use utils/html.go escaping functions:
# - utils.HTMLEscape() for HTML content
# - utils.JSEscape() for JavaScript contexts
# - utils.URLQueryEscape() for URL parameters
# - utils.SanitizeHTML() for basic HTML sanitization
