name: store
path: store
layer: stable
status: ga
owner: persistence
risk: medium
summary: Stable storage primitives and base abstractions. Topology-heavy cache implementations live in x/cache and durable KV-engine ownership lives in x/data/kvengine.

strict_boundary: persistence_primitives

responsibilities:
  - DB helpers
  - Cache primitives
  - File storage
  - KV storage
  - Idempotency primitives

non_goals:
  - Tenant-aware adapters
  - Business repositories
  - AI-specific caches
  - DB analytics, DB instrumentation wrappers, pool-stat polling, slow-query reporting, and DB health or retry-policy helpers
  - File backend/provider configuration, signed URLs, metadata-manager ownership, and image-processing pipelines
  - Read-write splitting, sharding topology defaults, durable KV-engine tuning, ranked-data cache behavior, and cache metrics or introspection ownership
  - Business-level idempotency semantics (domain-specific dedup rules belong in the application or x/* layer)

public_entrypoints:
  - db
  - cache
  - file
  - kv
  - idempotency

allowed_imports:
  - contract
  - log
  - metrics

forbidden_imports:
  - core/**
  - middleware/**
  - x/**
  - tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./store/...
  - go test -timeout 20s ./store/...
  - go vet ./store/...

doc_paths:
  - docs/modules/store/README.md

change_risks:
  - persistence correctness regression
  - concurrent access regression
  - isolation regression

review_checklist:
  - Keep store APIs transport-agnostic and free of tenant-specific logic
  - Keep topology-heavy data features, DB analytics, slow-query inspection, DB instrumentation wrappers, and pool-stat polling out of the stable layer
  - Keep HTTP response caching, request-derived cache keys, cache metrics or introspection ownership, file backend config, signed URLs, metadata-manager ownership, and thumbnail/image-processing ownership out of stable store roots
  - Keep WAL, snapshots, serializer selection, compression, and shard tuning out of stable store/kv
  - Prefer stdlib-compatible abstractions

agent_hints:
  - Move tenant-aware adapters to x/tenant/store; move DB analytics and slow-query helpers to x/observability/dbinsights
  - For distributed, provider-specific, or metrics/export-oriented cache needs use x/cache; for HTTP response caching use x/gateway/cache
  - For ranked-data cache behavior use x/cache/leaderboard, route durable KV-engine tuning to x/data/kvengine, and keep DB retry or health/reporting policy out of stable store/db
