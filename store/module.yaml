name: store
path: store
layer: stable
status: ga
owner: persistence
risk: medium
summary: Stable storage primitives and base abstractions. Topology-heavy cache implementations have been migrated to x/cache.

strict_boundary: persistence_primitives

responsibilities:
  - DB helpers
  - Cache primitives
  - File storage
  - KV storage
  - Idempotency primitives

non_goals:
  - Tenant-aware adapters
  - Business repositories
  - AI-specific caches
  - DB analytics and slow-query reporting
  - Read-write splitting and sharding topology defaults
  - HTTP transport behavior
  - Feature-specific ranked-data cache behavior
  - Business-level idempotency semantics (domain-specific dedup rules, e.g. payment deduplication policies, belong in the application or x/* layer)

public_entrypoints:
  - db
  - cache
  - file
  - kv
  - idempotency

allowed_imports:
  - contract
  - log
  - metrics

forbidden_imports:
  - core/**
  - middleware/**
  - x/**
  - tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./store/...
  - go test -timeout 20s ./store/...
  - go vet ./store/...

doc_paths:
  - docs/modules/store/README.md

change_risks:
  - persistence correctness regression
  - concurrent access regression
  - isolation regression

review_checklist:
  - Keep store APIs transport-agnostic
  - No tenant-specific logic in stable store
  - Keep topology-heavy data features out of the stable layer
  - Keep DB analytics and slow-query inspection out of stable store/db
  - Keep HTTP response caching and request-derived cache keys out of stable store/cache
  - Prefer stdlib-compatible abstractions

agent_hints:
  - Move tenant-aware adapters to x/tenant/store
  - Move DB analytics and slow-query helpers to x/observability/dbinsights
  - For distributed or provider-specific cache needs use x/cache; for HTTP response caching use x/gateway/cache
  - For ranked-data cache behavior use x/cache/leaderboard; do not add topology-heavy, provider-heavy, or business-level idempotency logic here
