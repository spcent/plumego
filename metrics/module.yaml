name: metrics
path: metrics
layer: stable
status: ga
owner: observability
risk: medium
summary: Metrics interfaces and base collectors.

strict_boundary: metrics_contracts

responsibilities:
  - Metrics collector interfaces
  - Base collectors
  - Minimal aggregate collector composition

non_goals:
  - App bootstrap
  - Feature-specific dashboards
  - Repo-wide feature metric type catalogs
  - Transport policy
  - Rolling-window aggregation helpers
  - Repo-wide metrics test utilities
  - Export pipeline wiring and adapters (belong in x/observability)

public_entrypoints:
  - AggregateCollector
  - Recorder
  - HTTPObserver
  - BaseMetricsCollector
  - NoopCollector
  - MultiCollector

allowed_imports:
  - log

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./metrics/...
  - go test -timeout 20s ./metrics/...
  - go vet ./metrics/...

doc_paths:
  - docs/modules/metrics/README.md

change_risks:
  - collector compatibility regression
  - metrics event regression

review_checklist:
  - Keep contracts small
  - Avoid feature taxonomy coupling
  - Keep feature-owned observer interfaces out of the stable layer
  - Keep non-HTTP feature helper methods out of stable collectors

agent_hints:
  - Observability capability packs and transport-specific logic belong outside the stable layer
  - Use x/observability for Prometheus, tracing, rolling-window aggregation, and metrics test helpers
  - Use x/observability helper packages for non-HTTP feature record builders when extension-side reuse is justified
  - Use x/devtools for dev-only collectors and x/messaging for messaging-specific reporters/exporters
