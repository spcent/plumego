name: metrics
path: metrics
layer: stable
status: ga
owner: observability
risk: medium
summary: Metrics interfaces and base collectors.

strict_boundary: metrics_contracts

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/metrics/README.md

responsibilities:
  - Metrics collector interfaces
  - Base collectors
  - Canonical HTTP metric record construction
  - Minimal aggregate collector composition

non_goals:
  - App bootstrap
  - Feature-specific dashboards
  - Repo-wide feature metric type catalogs or parallel identity fields
  - Transport policy
  - Rolling-window aggregation and record-buffer helpers
  - Repo-wide metrics test utilities
  - Export pipeline wiring and adapters (belong in x/observability)

public_entrypoints:
  - AggregateCollector
  - Recorder
  - HTTPObserver
  - BaseMetricsCollector
  - NoopCollector
  - MultiCollector

allowed_imports:
  - log

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./metrics/...
  - go test -timeout 20s ./metrics/...
  - go vet ./metrics/...

doc_paths:
  - docs/modules/metrics/README.md

change_risks:
  - collector compatibility regression
  - metrics event regression

stop_conditions:
  - The change introduces app bootstrap, export-pipeline wiring, or feature-specific dashboards into metrics
  - The change requires metrics to import x/* or absorb rolling-window aggregation, tracing, or transport-specific policy ownership
  - The change adds feature taxonomies, record-buffer retention policy, or devtools helpers to stable collectors
  - The change turns metrics into a capability pack instead of small stable contracts and collectors

review_checklist:
  - Keep contracts small
  - Avoid feature taxonomy coupling, parallel identity fields, and feature-owned observer interfaces
  - Keep HTTP status error classification consistent between Record and ObserveHTTP
  - Keep stats snapshots defensive, caller-owned, and active-series-normalized
  - Keep non-HTTP feature helpers, record-buffer inspection, and retention policy out of stable collectors

agent_hints:
  - Observability capability packs, raw record retention, and transport-specific policy belong outside the stable layer
  - Use NewHTTPRecord for shared HTTP request records instead of duplicating metric names, label keys, or timestamp behavior
  - Use x/observability for exporters, tracing, record buffers, metrics test helpers, and non-HTTP feature record builders; use x/devtools for dev-only collectors
