# Cloud Vault Configuration Example
# Copy this file to config.toml and adjust values as needed

# =============================================================================
# Server Configuration
# =============================================================================
[server]
# HTTP listen address (required)
# Format: ":port" or "host:port"
addr = ":8080"

# TLS configuration (optional)
[server.tls]
enabled = false
cert_file = ""
key_file = ""

# =============================================================================
# Database Configuration
# =============================================================================
[database]
# SQLite database file path (required)
# Parent directory will be created if it doesn't exist
path = "./data/app.db"

# =============================================================================
# Storage Configuration
# =============================================================================
[storage]
# Storage provider: "local" or "qiniu" (required)
provider = "local"

# Local filesystem storage (used when provider = "local")
[storage.local]
# Root directory for object storage (required when provider = "local")
# Directory will be created if it doesn't exist
root = "./data/objects"

# Qiniu Kodo cloud storage (used when provider = "qiniu")
[storage.qiniu]
# Qiniu Access Key (required when provider = "qiniu")
# For security, use environment variable QINIU_ACCESS_KEY instead
access_key = ""
# Qiniu Secret Key (required when provider = "qiniu")
# For security, use environment variable QINIU_SECRET_KEY instead
secret_key = ""
# Qiniu bucket name (required when provider = "qiniu")
bucket = ""
# Qiniu CDN domain (required when provider = "qiniu")
# Example: "https://cdn.example.com"
domain = ""
# Qiniu region (required when provider = "qiniu")
# Valid values: z0 (华东), z1 (华北), z2 (华南), na0 (北美), as0 (新加坡)
region = "z0"
# Use HTTPS for Qiniu API calls
use_https = true

# =============================================================================
# Application Configuration
# =============================================================================
[app]
# Maximum upload size in MB
max_upload_size_mb = 10
# Version retention policy: "all" (keep all versions) or "limited" (keep last N)
version_policy = "all"

# =============================================================================
# Authentication Configuration (V0.7+)
# =============================================================================
[auth]
# Enable authentication (recommended: true for production)
enabled = true
# Session cookie name (required when enabled = true)
cookie_name = "cloud_vault_session"
# Session time-to-live in hours (required when enabled = true)
session_ttl_hours = 168  # 7 days
# Minimum password length (required when enabled = true, minimum: 8)
password_min_length = 10
# Maximum failed login attempts before lockout (required when enabled = true)
max_login_failures = 5
# Account lockout duration in minutes (required when enabled = true)
lockout_minutes = 30
# Use secure cookies (recommended: true for production with HTTPS)
# Set to false only for local development
secure_cookie = false

# Bootstrap admin configuration (optional, for initial setup)
[auth.bootstrap_admin]
# Enable automatic admin creation on first startup
enabled = false
# Admin username (required when enabled = true)
username = ""
# Admin email (required when enabled = true)
email = ""
# Admin password (required when enabled = true)
# For security, use environment variable AUTH_BOOTSTRAP_ADMIN_PASSWORD instead
password = ""

# =============================================================================
# Full-text Search Configuration (V0.3+)
# =============================================================================
[search]
# Enable full-text search
enabled = true
# Automatically index documents on save
index_on_save = true
# Index documents during import: "inline", "background", or "disabled"
index_on_import = "background"
# Batch size for background indexing
index_batch_size = 100
# Interval between background indexing batches (seconds)
index_interval_seconds = 5
# Maximum document size to index (MB)
max_content_size_mb = 10
# Number of context tokens to show in search snippets
snippet_tokens = 20
# Maximum number of search history entries to retain
history_limit = 100

# =============================================================================
# Organization & Deduplication Configuration (V0.4+)
# =============================================================================
[organize]
# Enable duplicate detection
duplicate_detection = true
# Enable similarity detection
similarity_detection = true
# Enable tag suggestions
tag_suggestion = true
# Enable topic building
topic_build = true
# Threshold for near-duplicate detection (0.0-1.0, higher = stricter)
near_dup_threshold = 0.95
# Threshold for related document detection (0.0-1.0)
related_threshold = 0.7
# Maximum documents to compare per bucket
max_compare_per_bucket = 1000
# Batch size for similarity detection
similarity_batch_size = 100
# Automatically archive duplicates (move to .archive directory)
auto_archive_duplicates = false
# Automatically apply tag suggestions
auto_apply_tag_suggestions = false
# Enable prompt candidate detection
prompt_candidate_detection = true

# =============================================================================
# AI Features Configuration (V0.5+)
# =============================================================================
[ai]
# Enable AI features
enabled = false
# AI provider: "local_mock" (for testing) or "openai_compatible"
provider = "local_mock"
# OpenAI-compatible API base URL (required when provider = "openai_compatible")
base_url = ""
# OpenAI-compatible API key (required when provider = "openai_compatible")
# For security, use environment variable AI_API_KEY instead
api_key = ""
# AI model name (required when provider = "openai_compatible")
model = ""
# Maximum context tokens for AI requests
max_context_tokens = 4000
# Maximum retry attempts for failed AI requests
max_retries = 3
# Number of concurrent AI task workers
task_workers = 2
# Enable AI-generated document summaries
summary_enabled = true
# Enable AI-powered Q&A
qa_enabled = true
# Enable AI prompt extraction
prompt_extract_enabled = true

# =============================================================================
# Auto-Update Configuration (V1.0+)
# =============================================================================
[update]
# Enable automatic update checking
enabled = true
# Check for updates on application startup
check_on_startup = true
# Update check interval in minutes (default: 1440 = 24 hours)
check_interval_minutes = 1440
# Update channel: "stable", "beta", or "dev"
channel = "stable"
