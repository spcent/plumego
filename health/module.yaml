name: health
path: health
layer: stable
status: ga
owner: runtime
risk: medium
summary: Health state, readiness helpers, and an in-process manager surface, not an HTTP or ops analytics package.

strict_boundary: health_models

responsibilities:
  - Health status types
  - Readiness helpers
  - Health manager abstractions
  - In-process component registration and check orchestration

non_goals:
  - Feature orchestration
  - HTTP endpoint ownership
  - Transport-specific behavior
  - Build metadata exposure
  - Health history export or retention
  - Metrics, trend, or report generation
  - App-specific health check implementations (belong in reference apps or x/*)

public_entrypoints:
  - HealthStatus
  - HealthManager

allowed_imports:
  - stdlib

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./health/...
  - go test -timeout 20s ./health/...
  - go vet ./health/...

doc_paths:
  - docs/modules/health/README.md

change_risks:
  - readiness regression
  - health state regression

review_checklist:
  - Keep types simple and explicit
  - Keep health HTTP handlers outside this module
  - Keep ops reporting and analytics outside this module
  - Avoid feature-specific coupling

agent_hints:
  - Health is a support package, not an app feature catalog
  - Keep transport concerns and health HTTP surfaces in reference or extension packages, not here
  - Keep build info, history export, and metrics/reporting in owning extensions such as x/ops/healthhttp
