name: health
path: health
layer: stable
status: ga
owner: runtime
summary: Health models and readiness helpers, not an HTTP endpoint package.

strict_boundary: health_models

responsibilities:
  - Health status types
  - Readiness helpers
  - Health manager abstractions

non_goals:
  - Feature orchestration
  - HTTP endpoint ownership
  - Transport-specific behavior
  - App-specific health check implementations (belong in reference apps or x/*)

public_entrypoints:
  - HealthStatus
  - HealthManager

allowed_imports:
  - stdlib

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./health/...
  - go test -timeout 20s ./health/...
  - go vet ./health/...

doc_paths:
  - docs/modules/health/README.md

change_risks:
  - readiness regression
  - health state regression

review_checklist:
  - Keep types simple and explicit
  - Keep health HTTP handlers outside this module
  - Avoid feature-specific coupling

agent_hints:
  - Health is a support package, not an app feature catalog
  - Keep transport concerns elsewhere
  - Prefer reference or extension packages for health HTTP surfaces; do not add HTTP handlers here
