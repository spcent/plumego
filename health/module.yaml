name: health
path: health
layer: stable
status: ga
owner: runtime
risk: medium
summary: Health state, readiness helpers, and component health models, not an HTTP or ops analytics package.

strict_boundary: health_models

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/health/README.md

responsibilities:
  - Health status types
  - Readiness helpers
  - Component checker and component health models

non_goals:
  - Feature orchestration
  - Health manager abstractions or check orchestration
  - HTTP endpoint ownership
  - Transport-specific behavior
  - Build metadata exposure
  - Health history export or retention
  - Metrics, trend, or report generation

public_entrypoints:
  - HealthStatus
  - HealthState
  - ComponentChecker
  - ComponentHealth
  - ReadinessStatus

allowed_imports:
  - stdlib

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./health/...
  - go test -timeout 20s ./health/...
  - go vet ./health/...

doc_paths:
  - docs/modules/health/README.md

change_risks:
  - readiness regression
  - health state regression

stop_conditions:
  - The change introduces HTTP endpoint ownership, manager orchestration, or retry policy into health
  - The change requires health to import x/* or absorb ops analytics, history, or transport-specific behavior
  - The change turns health models into feature-specific status catalogs or app bootstrap glue
  - The change adds build metadata exposure, reporting, or retention policy as stable health defaults

review_checklist:
  - Keep types simple and explicit
  - Keep manager and retry policy outside this module
  - Keep health HTTP handlers outside this module
  - Keep ops reporting and analytics outside this module
  - Avoid feature-specific coupling

agent_hints:
  - Health is a support package, not an app feature catalog or ops surface
  - Health manager execution and health HTTP surfaces belong in reference apps or the owning ops extensions
  - Keep build info, history export, analytics, and reporting in owning extensions rather than stable health
