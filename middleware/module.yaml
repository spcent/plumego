name: middleware
path: middleware
layer: stable
status: ga
owner: transport
risk: high
summary: Transport-only HTTP middleware, including request/response cross-cutting concerns and transport observability primitives.

strict_boundary: transport_primitives

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/middleware/README.md

responsibilities:
  - Middleware chaining
  - Request and response cross-cutting concerns
  - Recovery, logging, timeout, CORS, compression

non_goals:
  - Business DTO assembly or service injection
  - Tenant policy, resolution, and quota orchestration
  - API version negotiation
  - Resource or protocol transformation
  - Observability adapter or export catalogs
  - Persistence access
  - Authentication token verification logic (belongs in injected Authenticator implementations)

public_entrypoints:
  - Middleware
  - Chain

allowed_imports:
  - contract
  - log
  - metrics
  - security

forbidden_imports:
  - core/**
  - store/**
  - x/**
  - tenant/**
  - x/ai/**

test_commands:
  - go test -race -timeout 60s ./middleware/...
  - go test -timeout 20s ./middleware/...
  - go vet ./middleware/...

doc_paths:
  - docs/modules/middleware/README.md

change_risks:
  - middleware order regression
  - double-next regression
  - error-path regression
  - coalesce key collision or incomplete variant-key regression

stop_conditions:
  - The change introduces business DTO assembly, service injection, or persistence access into middleware
  - The change requires middleware to learn tenant policy, quota, or protocol-family behavior that belongs in x/*
  - The change adds multi-phase middleware lifecycle abstractions instead of standard http.Handler chaining
  - The change turns middleware into an observability or policy catch-all bucket instead of narrow transport primitives

review_checklist:
  - next must be called exactly once
  - Keep responsibility transport-only
  - Keep observability behavior at the transport-primitive level
  - Prefer narrow middleware packages over umbrella buckets
  - No request-scoped service locator

agent_hints:
  - Tenant middleware belongs in x/tenant; route API version negotiation to x/rest/versioning; protocol transformation to x/gateway/*; stateful policy and observability catch-all out of middleware; rate limiting stays a thin HTTP adapter over security/abuse primitives; coalesce is GA but high-risk and should be used only for bounded safe non-streaming responses with explicit KeyFunc coverage for sensitive variants; accesslog observer/tracer arguments are transport observability wiring only, while exporter catalogs, backend setup, sampling policy, and pipeline composition stay in x/observability or application code; `middleware/internal/telemetry` is the shared internal helper surface for stable observability middleware such as accesslog, tracing, httpmetrics, recovery, bodylimit, and ratelimit, and must not widen into a public observability catalog
  - Request ID generation defaults may use package-local state for convenience, but production callers that need control should wire requestid.WithGenerator explicitly. Each subpackage should expose one canonical constructor path and remain a thin http.Handler adapter over explicit dependencies
  - "Constructor naming convention for new configurable middleware: stateless packages use Middleware(config T); stateful packages use New(config T) *Type with a Middleware() method; exported Config or Options structs should provide WithDefaults() or Default() unless the stable package-specific constructor owns inline defaults. Intentional stable naming exceptions include auth.Authenticate/auth.Authorize for dependency-validating auth adapters, cors.StrictDefaultOptions for strict preset generation, and ratelimit.NewAbuseGuard(...).Middleware() for lifecycle-owned rate limiting. Do not add alias wrapper families. File names should match the package or behavior entrypoint (auth.go not contract.go)."

task_affinity:
  add-middleware: middleware/
  middleware: middleware/
  bugfix_triage: middleware/

selection_guide:
  logging_access_log: middleware/accesslog/
  authentication_jwt: middleware/auth/
  body_size_limit: middleware/bodylimit/
  response_coalescing: middleware/coalesce/
  compression_gzip: middleware/compression/
  concurrency_limit: middleware/concurrencylimit/
  cors: middleware/cors/
  debug_inspection: middleware/debug/
  http_metrics: middleware/httpmetrics/
  http_rate_limiting: middleware/ratelimit/
  rate_limiting_primitive: x/resilience/ratelimit/
  panic_recovery: middleware/recovery/
  request_id_tracing: middleware/requestid/
  security_headers: middleware/security/
  timeout: middleware/timeout/
  distributed_tracing: middleware/tracing/
  tenant_resolution: x/tenant/
  circuit_breaker: x/resilience/circuitbreaker/
  observability_pipeline: x/observability/

landing_zones:
  access_log: accesslog/
  auth_adapter: auth/
  body_limit: bodylimit/
  coalesce: coalesce/
  compression: compression/
  concurrency: concurrencylimit/
  cors: cors/
  debug: debug/
  metrics: httpmetrics/
  rate_limit: ratelimit/
  recovery: recovery/
  request_id: requestid/
  security_headers: security/
  timeout: timeout/
  tracing: tracing/
