<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="logo-l-title">
  <title id="logo-l-title">Plumego</title>
  <defs>
    <linearGradient id="gl" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2BAEF5"/>
      <stop offset="100%" stop-color="#0870B8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#gl)"/>
  <!-- Quill shaft — vertical stroke of the P, tapers to a nib at bottom -->
  <path fill="#FFFFFF" d="M 14 11 L 22 11 L 22 52 L 18 58 L 14 52 Z"/>
  <!-- Feather barbs — four concentric arcs forming the P bowl -->
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="3.0"
        d="M 22 13 C 59 13, 59 35, 22 35"/>
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="2.2"
        d="M 22 16 C 52 16, 52 33, 22 33"/>
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="1.5"
        d="M 22 19 C 46 19, 46 31, 22 31"/>
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="1.0"
        d="M 22 22 C 40 22, 40 29, 22 29"/>
</svg>
