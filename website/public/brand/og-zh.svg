<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" rx="36" fill="#08111C"/>
  <rect width="1200" height="630" rx="36" fill="url(#paint0_radial)"/>
  <rect x="58" y="58" width="1084" height="514" rx="30" fill="rgba(9,18,30,0.78)" stroke="#243244"/>
  <!-- brand chip -->
  <rect x="104" y="92" width="196" height="44" rx="22" fill="#11375A"/>
  <rect x="112" y="100" width="28" height="28" rx="6" fill="url(#badge-g)"/>
  <!-- Quill shaft -->
  <path fill="#FFFFFF" d="M 118 105 L 122 105 L 122 123 L 120 126 L 118 123 Z"/>
  <!-- Feather barbs -->
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="1.3"
        d="M 122 106 C 138 106, 138 115, 122 115"/>
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="0.9"
        d="M 122 108 C 135 108, 135 113, 122 113"/>
  <text x="150" y="121" fill="#F3F7FB" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">Plumego</text>
  <!-- main content -->
  <text x="104" y="236" fill="#8FCFFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" letter-spacing="0.18em">面向显式 HTTP 服务的 Go 工具包</text>
  <text x="104" y="332" fill="#F8FBFD" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700">把 HTTP 模型</text>
  <text x="104" y="420" fill="#F8FBFD" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700">保持可见。</text>
  <text x="104" y="492" fill="#B7C3D1" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34">稳定根保持收敛，可选能力从 x/* 进入，而不是长成隐藏框架内核。</text>
  <g opacity="0.92">
    <rect x="792" y="162" width="250" height="88" rx="24" fill="rgba(9,18,30,0.8)" stroke="#233548"/>
    <text x="822" y="198" fill="#8FCFFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" letter-spacing="0.16em">CANONICAL PATH</text>
    <text x="822" y="234" fill="#F8FBFD" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">reference/standard-service</text>
  </g>
  <g opacity="0.92">
    <rect x="824" y="284" width="218" height="144" rx="24" fill="rgba(9,18,30,0.8)" stroke="#233548"/>
    <text x="854" y="320" fill="#8FCFFF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" letter-spacing="0.16em">默认阅读顺序</text>
    <text x="854" y="360" fill="#F8FBFD" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">docs → specs</text>
    <text x="854" y="396" fill="#F8FBFD" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700">→ tasks → code</text>
  </g>
  <defs>
    <linearGradient id="badge-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1BA0EC"/>
      <stop offset="100%" stop-color="#0A72B6"/>
    </linearGradient>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1084 560) rotate(-146.62) scale(745.368 814.562)">
      <stop stop-color="#0D8BD7" stop-opacity="0.17"/>
      <stop offset="0.48" stop-color="#0A1725" stop-opacity="0"/>
      <stop offset="1" stop-color="#0A1725" stop-opacity="0"/>
    </radialGradient>
  </defs>
