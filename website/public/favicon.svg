<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="fav-title">
  <title id="fav-title">Plumego</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2BAEF5"/>
      <stop offset="100%" stop-color="#0870B8"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#g)"/>
  <!-- Quill shaft — vertical stroke of the P, tapers to a nib at bottom -->
  <path fill="#FFFFFF" d="M 28 22 L 44 22 L 44 104 L 36 116 L 28 104 Z"/>
  <!-- Feather barbs — four concentric arcs forming the P bowl -->
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="6.0"
        d="M 44 26 C 118 26, 118 70, 44 70"/>
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="4.4"
        d="M 44 32 C 104 32, 104 66, 44 66"/>
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="3.0"
        d="M 44 38 C 92 38, 92 62, 44 62"/>
  <path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-width="2.0"
        d="M 44 44 C 80 44, 80 58, 44 58"/>
</svg>
