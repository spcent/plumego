name: core
path: core
layer: stable
status: ga
owner: runtime
risk: high
summary: App lifecycle and HTTP server assembly.

strict_boundary: kernel

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - reference/standard-service

responsibilities:
  - App construction and constructor dependencies
  - Route registration entrypoints
  - Middleware registration entrypoints
  - HTTP server lifecycle

non_goals:
  - Route matching
  - Feature-specific components
  - Feature catalog assembly
  - Tenant-specific behavior
  - Persistence logic
  - Debug/runtime snapshot payload contracts
  - Extension registration facades (explicit wiring in reference apps and x/* packages instead)

public_entrypoints:
  - New
  - App
  - AppDependencies
  - DefaultConfig
  - AppConfig
  - TLSConfig
  - RouterConfig
  - (*App).Use
  - (*App).AddRoute
  - (*App).Get
  - (*App).Post
  - (*App).Put
  - (*App).Delete
  - (*App).Patch
  - (*App).Any
  - (*App).URL
  - (*App).Routes
  - (*App).Logger
  - (*App).Prepare
  - (*App).Server
  - (*App).Shutdown

allowed_imports:
  - contract
  - router
  - middleware
  - health
  - log
  - metrics

forbidden_imports:
  - x/**
  - tenant/**
  - x/ai/**
  - net/**
  - pubsub/**
  - rest/**
  - validator/**
  - utils/**
  - store/db
  - store/cache
  - store/file

test_commands:
  - go test -race -timeout 60s ./core/...
  - go test -timeout 20s ./core/...
  - go vet ./core/...

doc_paths:
  - docs/modules/core/README.md

change_risks:
  - startup regression
  - shutdown regression
  - route assembly regression

stop_conditions:
  - The change introduces feature-specific behavior or a feature catalog surface
  - The change requires core to import x/* or learn tenant, data-topology, or protocol-family internals
  - The change introduces hidden registration, init side effects, or context service-locator flow
  - The change adds persistence logic or store-policy decisions to core

review_checklist:
  - Preserve net/http compatibility
  - Keep bootstrap explicit and grep-friendly
  - Keep core as a kernel, not a feature catalog
  - Keep route matching, business policy, and persistence outside core
  - Do not add hidden side effects or implicit registration

agent_hints:
  - Start app-wiring changes from reference/standard-service and only widen core when the kernel truly owns the behavior
  - Prefer explicit constructor and route wiring updates over registries, plugin surfaces, or auto-discovery
  - If the task needs tenant, data, or protocol-specific behavior, route it to the owning x/* family instead of widening core
