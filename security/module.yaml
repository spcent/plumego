name: security
path: security
layer: stable
status: ga
owner: security
risk: critical
summary: Security helpers for auth, headers, input safety, and abuse protection.

strict_boundary: auth_primitives

entrypoint_reads:
  - AGENTS.md
  - docs/CANONICAL_STYLE_GUIDE.md
  - docs/architecture/AGENT_FIRST_REPO_BLUEPRINT.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/security/README.md

responsibilities:
  - Auth identity primitives
  - JWT helpers
  - Security headers
  - Input safety
  - Abuse guard primitives
  - Password helpers

non_goals:
  - App bootstrap
  - Tenant policy orchestration
  - Persistence logic
  - Session lifecycle management, revocation, and tenant-session sentinel errors (belong in x/tenant/session or application code)
  - Reusable resilience components such as circuit breakers (belong in x/resilience)

public_entrypoints:
  - authn
  - jwt
  - headers
  - input
  - abuse
  - password

allowed_imports:
  - contract
  - log

forbidden_imports:
  - core/**
  - router/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./security/...
  - go test -timeout 20s ./security/...
  - go vet ./security/...

doc_paths:
  - docs/modules/security/README.md

change_risks:
  - auth bypass regression
  - header policy regression
  - deny-path regression

stop_conditions:
  - The change introduces app bootstrap, tenant orchestration, or session lifecycle management into security
  - The change requires security to import x/* or absorb resilience, protocol, or application feature behavior
  - The change weakens fail-closed verification behavior or introduces secret logging
  - The change hides verification or policy flow behind implicit globals, middleware magic, or context service location

review_checklist:
  - Never log secrets
  - Fail closed on verification errors
  - Keep verification logic explicit
  - Use timing-safe comparison for secret checks
  - Keep tenant session and policy orchestration out of security

agent_hints:
  - Tenant policy and session lifecycle stay in x/tenant; reusable resilience stays in x/resilience
  - Prefer explicit verifiers and timing-safe comparison for secrets instead of convenience wrappers with hidden behavior
  - Negative-path tests are mandatory for auth, token, signature, and header-policy changes
