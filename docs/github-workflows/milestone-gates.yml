name: Milestone Quality Gates

# SETUP: .github/ is in .gitignore for this repo.
# To activate this workflow, run once:
#   mkdir -p .github/workflows
#   cp docs/github-workflows/milestone-gates.yml .github/workflows/
#   git add -f .github/workflows/milestone-gates.yml
#   git commit -m "ci: add milestone quality gates workflow"
#
# Or remove .github/ from .gitignore and re-add the file normally.
#
# Runs automatically on milestone branches and on PRs targeting main from
# milestone/* branches. This is the only CI gate before human review.

on:
  push:
    branches:
      - 'milestone/**'
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       startsWith(github.head_ref, 'milestone/'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Dependency rules check
        id: dep_rules
        run: go run ./internal/checks/dependency-rules
        continue-on-error: true

      - name: Agent workflow check
        id: agent_workflow
        run: go run ./internal/checks/agent-workflow
        continue-on-error: true

      - name: Module manifests check
        id: module_manifests
        run: go run ./internal/checks/module-manifests
        continue-on-error: true

      - name: Reference layout check
        id: ref_layout
        run: go run ./internal/checks/reference-layout
        continue-on-error: true

      - name: go vet
        id: vet
        run: go vet ./...
        continue-on-error: true

      - name: gofmt
        id: fmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi
        continue-on-error: true

      - name: Tests (race)
        id: tests_race
        run: go test -race -timeout 60s ./...
        continue-on-error: true

      - name: Tests (standard)
        id: tests
        run: go test -timeout 20s ./...
        continue-on-error: true

      - name: Gate summary
        id: summary
        run: |
          echo "## Milestone Quality Gates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| dependency-rules | ${{ steps.dep_rules.outcome == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| agent-workflow   | ${{ steps.agent_workflow.outcome == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| module-manifests | ${{ steps.module_manifests.outcome == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| reference-layout | ${{ steps.ref_layout.outcome == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| go vet           | ${{ steps.vet.outcome == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| gofmt            | ${{ steps.fmt.outcome == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tests (race)     | ${{ steps.tests_race.outcome == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tests            | ${{ steps.tests.outcome == 'success' && 'PASS' || 'FAIL' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any gate failed
        run: |
          FAILED=0
          [ "${{ steps.dep_rules.outcome }}"      != "success" ] && FAILED=1
          [ "${{ steps.agent_workflow.outcome }}"  != "success" ] && FAILED=1
          [ "${{ steps.module_manifests.outcome }}" != "success" ] && FAILED=1
          [ "${{ steps.ref_layout.outcome }}"      != "success" ] && FAILED=1
          [ "${{ steps.vet.outcome }}"             != "success" ] && FAILED=1
          [ "${{ steps.fmt.outcome }}"             != "success" ] && FAILED=1
          [ "${{ steps.tests_race.outcome }}"      != "success" ] && FAILED=1
          [ "${{ steps.tests.outcome }}"           != "success" ] && FAILED=1
          if [ $FAILED -eq 1 ]; then
            echo "One or more quality gates failed. See summary above."
            exit 1
          fi
          echo "All quality gates passed."

      # Post gate results as a PR comment so the human reviewer can see them
      # without digging through job logs.
      - name: Post gate results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcomes = {
              dep_rules:       '${{ steps.dep_rules.outcome }}',
              agent_workflow:  '${{ steps.agent_workflow.outcome }}',
              module_manifests:'${{ steps.module_manifests.outcome }}',
              ref_layout:      '${{ steps.ref_layout.outcome }}',
              vet:             '${{ steps.vet.outcome }}',
              fmt:             '${{ steps.fmt.outcome }}',
              tests_race:      '${{ steps.tests_race.outcome }}',
              tests:           '${{ steps.tests.outcome }}',
            };
            const rows = Object.entries(outcomes)
              .map(([k, v]) => `| \`${k}\` | ${v === 'success' ? '✅ PASS' : '❌ FAIL'} |`)
              .join('\n');
            const allPass = Object.values(outcomes).every(v => v === 'success');
            const body = [
              `## Milestone Quality Gates — ${allPass ? '✅ All Pass' : '❌ Failures Detected'}`,
              '',
              '| Gate | Result |',
              '|------|--------|',
              rows,
              '',
              allPass
                ? '_All gates green. Ready for human review._'
                : '_Fix failing gates before requesting review._',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
