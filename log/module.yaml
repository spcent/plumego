name: log
path: log
layer: stable
status: ga
owner: runtime
risk: medium
summary: Logging interfaces and base implementations.

strict_boundary: logging

responsibilities:
  - Logging interfaces
  - Base logger implementations
  - Logging field helpers

non_goals:
  - Feature behavior
  - Metrics collection
  - Request policy decisions
  - Structured log aggregation or export backends (belong in x/observability)

public_entrypoints:
  - StructuredLogger
  - NewGLogger

allowed_imports:
  - stdlib

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./log/...
  - go test -timeout 20s ./log/...
  - go vet ./log/...

doc_paths:
  - docs/modules/log/README.md

change_risks:
  - logger compatibility regression
  - field formatting regression

review_checklist:
  - Never log secrets
  - Keep interfaces minimal

agent_hints:
  - Logging contracts should stay decoupled from feature packages
  - Avoid app-specific semantics here
  - Never log secrets, tokens, or private keys; this is a non-negotiable security requirement
