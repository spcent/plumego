name: log
path: log
layer: stable
status: ga
suggested_gate_profile: stable_root_change
owner: runtime
risk: medium
summary: Logging interfaces and base implementations.

strict_boundary: logging

entrypoint_reads:
  - AGENTS.md
  - docs/reference/canonical-style-guide.md
  - AGENTS.md
  - specs/repo.yaml
  - specs/task-routing.yaml
  - specs/dependency-rules.yaml
  - docs/modules/log/README.md

responsibilities:
  - Logging interfaces
  - Canonical base logger construction
  - Logging field helpers

non_goals:
  - Feature behavior
  - Metrics collection
  - Request policy decisions
  - Repo-wide testing helpers
  - Structured log aggregation or export backends (belong in x/observability)

public_entrypoints:
  - Level
  - Fields
  - LoggerFormat
  - LoggerFormatText
  - LoggerFormatJSON
  - LoggerFormatDiscard
  - LoggerConfig
  - StructuredLogger
  - NewLogger

allowed_imports:
  - stdlib

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./log/...
  - go test -timeout 20s ./log/...
  - go vet ./log/...

doc_paths:
  - docs/modules/log/README.md

change_risks:
  - logger compatibility regression
  - field formatting regression
  - JSON field encoding regression
  - internal file backend lifecycle regression

stop_conditions:
  - The change introduces feature behavior, request policy, or app bootstrap ownership into log
  - The change requires log to import x/* or absorb export backends, aggregation, or observability pipeline wiring
  - The change adds package-global singleton state or hidden logger registration to the stable runtime path
  - The change widens log into a testing-helper or feature-specific semantics package

review_checklist:
  - Never log secrets
  - Keep interfaces minimal
  - Keep backend ownership constructor-local; no package-global singleton in the stable runtime path
  - Keep field merging deterministic, text fields unambiguous, and JSON core/nested fields preserved
  - Keep formatting and field helpers generic, not feature-specific

agent_hints:
  - Logging contracts should stay decoupled from feature packages and transport policy
  - Keep CLI bootstrap, default singleton helpers, file rotation, and export backends out of the stable public runtime path
  - Never log secrets, tokens, signatures, or private keys

task_affinity:
  bugfix_triage: log/

landing_zones:
  logger_interface: logger.go
  json_backend: json.go
  glog_backend: glog.go

docs_sync_contract:
  on_api_change:
    - docs/evidence/stable-api/snapshots/log-head.snapshot
    - docs/modules/log/README.md
  on_behavior_change:
    - docs/modules/log/README.md
