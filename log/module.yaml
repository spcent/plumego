name: log
path: log
layer: stable
status: ga
owner: runtime
risk: medium
summary: Logging interfaces and base implementations.

strict_boundary: logging

responsibilities:
  - Logging interfaces
  - Canonical base logger construction
  - Logging field helpers

non_goals:
  - Feature behavior
  - Metrics collection
  - Request policy decisions
  - Repo-wide testing helpers
  - Structured log aggregation or export backends (belong in x/observability)

public_entrypoints:
  - StructuredLogger
  - NewLogger

allowed_imports:
  - stdlib

forbidden_imports:
  - core/**
  - router/**
  - middleware/**
  - security/**
  - store/**
  - x/**

test_commands:
  - go test -race -timeout 60s ./log/...
  - go test -timeout 20s ./log/...
  - go vet ./log/...

doc_paths:
  - docs/modules/log/README.md

change_risks:
  - logger compatibility regression
  - field formatting regression

review_checklist:
  - Never log secrets
  - Keep interfaces minimal
  - Keep backend ownership constructor-local; no package-global singleton in the stable runtime path

agent_hints:
  - Logging contracts should stay decoupled from feature packages
  - Avoid app-specific semantics; keep CLI flag bootstrap and default singleton helpers out of the stable public/runtime path
  - Never log secrets, tokens, or private keys
